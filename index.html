<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hệ thống Học tập Tiếng Trung Cloud</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    /* Hiệu ứng nền chuyển động mượt mà */
    .animated-bg {
      background: linear-gradient(-45deg, #e0f2fe, #f3e8ff, #dbeafe, #fce7f3);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Hiệu ứng chuyển cảnh giữa các trang */
    .page-section {
      transition: opacity 0.4s ease-out, transform 0.4s ease-out;
    }
    .page-section.hidden {
      display: none !important;
      opacity: 0;
      transform: translateY(20px);
    }
    .page-section:not(.hidden) {
      animation: pageEnter 0.5s forwards;
    }
    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hiệu ứng rung lắc khi nhập câu trả lời sai */
    .shake {
      animation: shakeError 0.4s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes shakeError {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }
  </style>
</head>
<body class="animated-bg min-h-screen font-sans text-gray-800">
  
  <nav id="navbar" class="hidden bg-white/80 backdrop-blur-md shadow-md p-4 sticky top-0 z-50">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold text-blue-600">Hệ thống Học tập Tiếng Trung</h1>
      <button id="btn-switch-role" class="text-sm font-medium text-gray-600 hover:text-blue-500 bg-gray-100 px-3 py-1.5 rounded-lg active:scale-95 transition-all">🔄 Đổi Vai Trò</button>
    </div>
  </nav>

  <main id="app" class="max-w-4xl mx-auto p-4 flex justify-center items-center min-h-[85vh]">
    
    <div id="page-login" class="page-section bg-white p-8 rounded-2xl shadow-xl text-center w-full max-w-sm">
      <h2 class="text-2xl font-bold mb-6">Đăng nhập</h2>
      <button id="btn-google-login" class="w-full flex items-center justify-center gap-2 bg-white border border-gray-300 rounded-lg p-3 hover:bg-gray-50 hover:shadow-md transition-all active:scale-95">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google">
        <span class="font-medium">Đăng nhập bằng Google</span>
      </button>
    </div>

    <div id="page-role" class="page-section hidden w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center text-gray-800 drop-shadow-sm">Bạn là ai?</h2>
      <div class="grid grid-cols-2 gap-4">
        <button id="role-teacher" class="bg-white p-6 rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all flex flex-col items-center gap-3 group active:scale-95">
          <span class="text-5xl group-hover:scale-110 transition-transform">👨‍🏫</span>
          <span class="font-semibold text-base text-gray-700">Giảng viên</span>
        </button>
        <button id="role-student" class="bg-white p-6 rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all flex flex-col items-center gap-3 group active:scale-95">
          <span class="text-5xl group-hover:scale-110 transition-transform">🎓</span>
          <span class="font-semibold text-base text-gray-700">Sinh viên</span>
        </button>
      </div>
    </div>

    <div id="page-teacher" class="page-section hidden w-full bg-white/95 p-5 md:p-8 rounded-2xl shadow-xl">
      <h2 class="text-2xl font-bold mb-4 text-blue-600">Thêm Bài Tập Mới</h2>
      
      <div class="mb-6 border-2 border-dashed border-blue-300 p-5 rounded-xl text-center bg-blue-50/50">
        <p class="mb-2 text-xs md:text-sm text-gray-600">Tải lên file Excel (.xlsx). Hệ thống sẽ tự động tìm và trích xuất dữ liệu từ các cột <b class="text-blue-600">Từ mới</b>, <b class="text-blue-600">Phiên âm</b>, <b class="text-blue-600">Nghĩa</b>.</p>
        <input type="file" id="excel-upload" title="Chọn file excel" accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer"/>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
        <input type="text" id="input-tumoi" placeholder="Từ mới" class="border rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-400 outline-none transition-all">
        <input type="text" id="input-phienam" placeholder="Phiên âm" class="border rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-400 outline-none transition-all">
        <input type="text" id="input-nghia" placeholder="Nghĩa" class="border rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-400 outline-none transition-all">
      </div>
      <button id="btn-add-word" class="w-full md:w-auto bg-blue-600 text-white px-6 py-2.5 rounded-lg hover:bg-blue-700 active:scale-95 transition-all mb-6 text-sm font-medium">Thêm từ</button>

      <div class="overflow-x-auto max-h-60 border rounded-lg shadow-inner bg-gray-50">
        <table class="w-full text-left border-collapse text-sm">
          <thead>
            <tr class="bg-gray-100 sticky top-0 shadow-sm"><th class="p-3">Từ mới</th><th class="p-3">Phiên âm</th><th class="p-3">Nghĩa</th></tr>
          </thead>
          <tbody id="teacher-word-list" class="divide-y bg-white"></tbody>
        </table>
      </div>
      <button id="btn-save-exercise" class="mt-6 w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 active:scale-95 transition-all shadow-md">Lưu Bài Tập Lên Đám Mây (Cloud)</button>
    </div>

    <div id="page-student-list" class="page-section hidden w-full">
      <h2 class="text-2xl font-bold mb-6 text-gray-800 drop-shadow-sm text-center">Danh sách Bài tập Trực tuyến</h2>
      <div id="exercise-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </div>

    <div id="page-student-quiz" class="page-section hidden w-full bg-white p-5 md:p-8 rounded-2xl shadow-xl max-w-2xl mx-auto">
      <button id="btn-back-exercises" class="text-gray-500 hover:text-gray-800 mb-4 inline-block font-medium text-sm transition-colors">← Quay lại danh sách</button>
      
      <div id="quiz-setup" class="mb-6 bg-gray-50 p-4 rounded-xl border">
        <h3 class="font-bold mb-3 text-gray-700 text-sm">Chọn thông tin làm từ gợi ý (Câu hỏi):</h3>
        <div class="flex flex-wrap gap-4 text-sm">
          <label class="cursor-pointer flex items-center gap-2 font-medium"><input type="radio" name="prompt_type" value="tumoi" checked class="w-4 h-4 text-blue-600"> Từ mới</label>
          <label class="cursor-pointer flex items-center gap-2 font-medium"><input type="radio" name="prompt_type" value="phienam" class="w-4 h-4 text-blue-600"> Phiên âm</label>
          <label class="cursor-pointer flex items-center gap-2 font-medium"><input type="radio" name="prompt_type" value="nghia" class="w-4 h-4 text-blue-600"> Nghĩa</label>
        </div>
        <button id="btn-start-quiz" class="mt-4 w-full sm:w-auto bg-blue-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 transition-all active:scale-95 text-sm">Bắt đầu làm bài</button>
      </div>

      <div id="quiz-area" class="hidden text-center">
        <div class="mb-2 text-xs md:text-sm text-gray-400 font-bold tracking-wider uppercase" id="quiz-progress">Từ 1 / 10</div>
        <div class="text-4xl md:text-5xl font-bold text-blue-600 mb-8 py-6 border-b border-gray-100" id="quiz-prompt">---</div>
        
        <div class="grid grid-cols-1 gap-4 max-w-sm mx-auto" id="quiz-inputs-container"></div>
      </div>
    </div>

  </main>

  <script>
    // -------------------------------------------------------------
    // CẤU HÌNH FIREBASE - DÁN ĐOẠN MÃ CỦA BẠN VÀO ĐÂY
    // -------------------------------------------------------------
    const firebaseConfig = {
  apiKey: "AIzaSyBynCOxVhtr5wp2d9miPDkwkzjma7C70Ik",
  authDomain: "luyentiengtrung-fd6ed.firebaseapp.com",
  projectId: "luyentiengtrung-fd6ed",
  storageBucket: "luyentiengtrung-fd6ed.firebasestorage.app",
  messagingSenderId: "1001015127985",
  appId: "1:1001015127985:web:0548f63c11325b40f05790",
  measurementId: "G-QB3PNTRMMC"
};
    
    // Khởi tạo kết nối đến Firebase Cloud
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    // -------------------------------------------------------------

    let currentExercise = []; 
    let savedExercises = []; // Dữ liệu sẽ tự động đồng bộ từ đám mây về đây
    let activeQuiz = null; 
    let quizCurrentIndex = 0;
    let quizPromptType = 'tumoi'; 

    const pages = {
      login: document.getElementById('page-login'),
      role: document.getElementById('page-role'),
      teacher: document.getElementById('page-teacher'),
      studentList: document.getElementById('page-student-list'),
      studentQuiz: document.getElementById('page-student-quiz')
    };

    // TỰ ĐỘNG ĐỒNG BỘ DỮ LIỆU TỪ CLOUD (Bất kỳ thiết bị nào thêm bài, toàn bộ hệ thống sẽ cập nhật ngay lập tức)
    database.ref('exercises').on('value', (snapshot) => {
      const data = snapshot.val();
      // Chuyển đổi object từ Firebase thành mảng bài tập
      savedExercises = data ? Object.values(data) : [];
      
      // Nếu sinh viên đang ở trang danh sách bài tập thì tự động làm mới giao diện
      if (!pages.studentList.classList.contains('hidden')) {
        renderStudentExercises();
      }
    });

    // Điều hướng giữa các màn hình
    function showPage(pageId) {
      Object.values(pages).forEach(p => p.classList.add('hidden'));
      pages[pageId].classList.remove('hidden');
      
      const nav = document.getElementById('navbar');
      if (pageId === 'login') nav.classList.add('hidden');
      else nav.classList.remove('hidden');
    }

    document.getElementById('btn-google-login').addEventListener('click', () => showPage('role'));
    document.getElementById('btn-switch-role').addEventListener('click', () => showPage('role'));

    document.getElementById('role-teacher').addEventListener('click', () => {
      currentExercise = [];
      renderTeacherList();
      showPage('teacher');
    });

    document.getElementById('role-student').addEventListener('click', () => {
      renderStudentExercises();
      showPage('studentList');
    });

    // --- LOGIC GIẢNG VIÊN ---
    const tbody = document.getElementById('teacher-word-list');

    function renderTeacherList() {
      tbody.innerHTML = currentExercise.map(word => `
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="p-3 font-semibold text-gray-800">${word.tumoi}</td>
          <td class="p-3 text-gray-600">${word.phienam}</td>
          <td class="p-3 text-gray-600">${word.nghia}</td>
        </tr>
      `).join('');
    }

    document.getElementById('btn-add-word').addEventListener('click', () => {
      const tumoi = document.getElementById('input-tumoi').value.trim();
      const phienam = document.getElementById('input-phienam').value.trim();
      const nghia = document.getElementById('input-nghia').value.trim();

      if (tumoi && phienam && nghia) {
        currentExercise.push({ tumoi, phienam, nghia });
        renderTeacherList();
        document.getElementById('input-tumoi').value = '';
        document.getElementById('input-phienam').value = '';
        document.getElementById('input-nghia').value = '';
      } else {
        alert("Vui lòng nhập đầy đủ cả 3 thông tin!");
      }
    });

    // THUẬT TOÁN ĐỌC FILE EXCEL THÔNG MINH
    document.getElementById('excel-upload').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (evt) => {
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        let headerRowIdx = -1;
        let colMap = { tumoi: -1, phienam: -1, nghia: -1 };

        for (let i = 0; i < json.length; i++) {
          const row = json[i];
          if (!row) continue;
          let tM = -1, pA = -1, ng = -1;

          row.forEach((cell, idx) => {
            if (cell !== undefined && cell !== null) {
              const val = String(cell).trim().toLowerCase();
              if (val === "từ mới" || val === "tumoi" || val === "từmới") tM = idx;
              else if (val === "phiên âm" || val === "phienam" || val === "phiênâm") pA = idx;
              else if (val === "nghĩa" || val === "nghia") ng = idx;
            }
          });

          if (tM !== -1 && pA !== -1 && ng !== -1) {
            headerRowIdx = i;
            colMap = { tumoi: tM, phienam: pA, nghia: ng };
            break;
          }
        }

        if (headerRowIdx !== -1) {
          let addedCount = 0;
          for (let i = headerRowIdx + 1; i < json.length; i++) {
            const row = json[i];
            if (!row) continue;

            const tumoiVal = row[colMap.tumoi] !== undefined ? String(row[colMap.tumoi]).trim() : "";
            const phienamVal = row[colMap.phienam] !== undefined ? String(row[colMap.phienam]).trim() : "";
            const nghiaVal = row[colMap.nghia] !== undefined ? String(row[colMap.nghia]).trim() : "";

            if (tumoiVal !== "") {
              currentExercise.push({ tumoi: tumoiVal, phienam: phienamVal, nghia: nghiaVal });
              addedCount++;
            }
          }

          if (addedCount > 0) {
            renderTeacherList();
            alert(`Tải thành công! Đã lọc lấy đúng ${addedCount} từ từ file Excel.`);
          } else {
            alert("Không phát hiện dữ liệu hợp lệ phía dưới dòng tiêu đề.");
          }
        } else {
          alert("LỖI: File Excel thiếu cột tiêu đề bắt buộc ('Từ mới', 'Phiên âm', 'Nghĩa')!");
        }
      };
      reader.readAsArrayBuffer(file);
      e.target.value = '';
    });

    // LƯU BÀI TẬP LÊN CLOUD DATABASE (Thay thế hoàn toàn LocalStorage)
    document.getElementById('btn-save-exercise').addEventListener('click', () => {
      if (currentExercise.length === 0) return alert("Hiện chưa có từ nào để tạo bài tập!");
      
      const exerciseId = Date.now(); // Dùng thời gian làm mã ID độc nhất cho bài tập
      const newExercise = {
        id: exerciseId,
        date: new Date().toLocaleDateString('vi-VN'),
        words: [...currentExercise]
      };

      // Đẩy dữ liệu trực tiếp lên mây Firebase
      database.ref('exercises/' + exerciseId).set(newExercise)
        .then(() => {
          currentExercise = [];
          renderTeacherList();
          alert("🎉 Tuyệt vời! Bài tập đã được đồng bộ lên hệ thống Đám mây. Toàn bộ sinh viên đã có thể làm bài tập này!");
        })
        .catch((error) => {
          alert("Lỗi kết nối khi lưu bài tập: " + error.message);
        });
    });

    // --- LOGIC SINH VIÊN ---
    function renderStudentExercises() {
      const container = document.getElementById('exercise-list');
      if (savedExercises.length === 0) {
        container.innerHTML = `<p class="col-span-full text-center text-gray-500 bg-white p-6 rounded-xl border">Hiện chưa có bài tập nào trên hệ thống Cloud.</p>`;
        return;
      }
      // Sắp xếp bài tập mới nhất lên đầu
      const sortedExercises = [...savedExercises].reverse();
      container.innerHTML = sortedExercises.map((ex, idx) => `
        <div class="bg-white p-5 rounded-xl shadow border border-gray-100 cursor-pointer hover:shadow-md hover:ring-2 hover:ring-blue-400 transition-all active:scale-95" onclick="openQuizById(${ex.id})">
          <h3 class="font-bold text-lg text-blue-600">Bài tập ngày ${ex.date}</h3>
          <p class="text-xs text-gray-400 mt-2">Mã số bài: #${ex.id} | Số lượng từ: ${ex.words.length} từ</p>
        </div>
      `).join('');
    }

    window.openQuizById = (id) => {
      const selected = savedExercises.find(ex => ex.id === id);
      if(!selected) return;
      activeQuiz = selected.words;
      document.getElementById('quiz-area').classList.add('hidden');
      document.getElementById('quiz-setup').classList.remove('hidden');
      showPage('studentQuiz');
    };

    document.getElementById('btn-back-exercises').addEventListener('click', () => showPage('studentList'));

    document.getElementById('btn-start-quiz').addEventListener('click', () => {
      quizPromptType = document.querySelector('input[name="prompt_type"]:checked').value;
      quizCurrentIndex = 0;
      document.getElementById('quiz-setup').classList.add('hidden');
      document.getElementById('quiz-area').classList.remove('hidden');
      loadQuizWord();
    });

    function loadQuizWord() {
      if (quizCurrentIndex >= activeQuiz.length) {
        alert("🎉 Chúc mừng! Bạn đã hoàn thành bài tập trực tuyến.");
        showPage('studentList');
        return;
      }

      const word = activeQuiz[quizCurrentIndex];
      document.getElementById('quiz-progress').innerText = `Từ ${quizCurrentIndex + 1} / ${activeQuiz.length}`;
      document.getElementById('quiz-prompt').innerText = word[quizPromptType];

      const inputContainer = document.getElementById('quiz-inputs-container');
      inputContainer.innerHTML = '';

      const fields = [
        { key: 'tumoi', label: 'Từ mới' },
        { key: 'phienam', label: 'Phiên âm' },
        { key: 'nghia', label: 'Nghĩa' }
      ].filter(f => f.key !== quizPromptType);

      fields.forEach(field => {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `Nhập đúng ${field.label}`;
        input.dataset.key = field.key;
        input.dataset.correct = word[field.key];
        input.className = "quiz-input border-2 p-3.5 rounded-xl text-base text-center outline-none focus:border-blue-400 transition-all font-semibold shadow-sm bg-gray-50";
        
        input.addEventListener('change', checkInput);
        inputContainer.appendChild(input);
      });
      
      setTimeout(() => {
        const firstInp = inputContainer.querySelector('input');
        if(firstInp) firstInp.focus();
      }, 100);
    }

    function checkInput(e) {
      const input = e.target;
      const correctVal = input.dataset.correct.toLowerCase().trim();
      const userVal = input.value.toLowerCase().trim();

      if (userVal === correctVal) {
        input.classList.remove('border-red-500', 'text-red-500', 'shake');
        input.classList.add('border-green-500', 'text-green-600', 'bg-green-50');
        input.disabled = true;
        checkAllDone();
      } else if (userVal !== '') {
        input.classList.add('border-red-500', 'text-red-500', 'shake');
        setTimeout(() => {
          input.value = '';
          input.classList.remove('shake');
        }, 400);
      }
    }

    function checkAllDone() {
      const inputs = document.querySelectorAll('.quiz-input');
      const allCorrect = Array.from(inputs).every(inp => inp.disabled);
      if (allCorrect) {
        setTimeout(() => {
          quizCurrentIndex++;
          loadQuizWord();
        }, 800); 
      }
    }

    showPage('login');
  </script>
</body>
</html>
