<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hệ thống Học tập Tiếng Trung PRO</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <style>
    .animated-bg {
      background: linear-gradient(-45deg, #e0f2fe, #f3e8ff, #dbeafe, #fce7f3);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .page-section { transition: opacity 0.4s ease-out, transform 0.4s ease-out; }
    .page-section.hidden { display: none !important; opacity: 0; transform: translateY(20px); }
    .page-section:not(.hidden) { animation: pageEnter 0.5s forwards; }
    @keyframes pageEnter { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .shake { animation: shakeError 0.4s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shakeError { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
  </style>
</head>
<body class="animated-bg min-h-screen font-sans text-gray-800">
  
  <nav id="navbar" class="hidden bg-white/80 backdrop-blur-md shadow-md p-4 sticky top-0 z-50">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold text-blue-600">Hệ thống Học tập</h1>
      <div class="flex items-center gap-3">
        <span id="user-info" class="text-sm font-semibold text-gray-700"></span>
        <button id="btn-switch-role" class="text-sm font-medium text-gray-600 hover:text-blue-500 bg-gray-100 px-3 py-1.5 rounded-lg active:scale-95 transition-all">🔄 Đổi Vai Trò</button>
        <button id="btn-logout" class="text-sm font-medium text-red-500 hover:text-red-700 bg-red-50 px-3 py-1.5 rounded-lg active:scale-95 transition-all">Đăng xuất</button>
      </div>
    </div>
  </nav>

  <main id="app" class="max-w-5xl mx-auto p-4 flex justify-center items-center min-h-[85vh] w-full">
    
    <div id="page-login" class="page-section bg-white p-8 rounded-2xl shadow-xl text-center w-full max-w-sm">
      <h2 class="text-2xl font-bold mb-6">Đăng nhập</h2>
      <button id="btn-google-login" class="w-full flex items-center justify-center gap-2 bg-white border border-gray-300 rounded-lg p-3 hover:bg-gray-50 hover:shadow-md transition-all active:scale-95">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google">
        <span class="font-medium">Đăng nhập bằng Google</span>
      </button>
    </div>

    <div id="page-role" class="page-section hidden w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center text-gray-800 drop-shadow-sm">Bạn là ai?</h2>
      <div class="grid grid-cols-2 gap-4">
        <button id="role-teacher" class="bg-white p-6 rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all flex flex-col items-center gap-3 group active:scale-95">
          <span class="text-5xl group-hover:scale-110 transition-transform">👨‍🏫</span>
          <span class="font-semibold text-base text-gray-700">Giảng viên</span>
        </button>
        <button id="role-student" class="bg-white p-6 rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all flex flex-col items-center gap-3 group active:scale-95">
          <span class="text-5xl group-hover:scale-110 transition-transform">🎓</span>
          <span class="font-semibold text-base text-gray-700">Sinh viên</span>
        </button>
      </div>
    </div>

    <div id="page-teacher" class="page-section hidden w-full grid grid-cols-1 lg:grid-cols-4 gap-6 items-start">
      <div class="bg-white/95 p-5 rounded-2xl shadow-xl lg:col-span-1">
        <h3 class="font-bold text-lg text-gray-700 mb-3 pb-2 border-b">Bài tập trên Cloud</h3>
        <div id="teacher-exercise-list" class="space-y-2 max-h-[60vh] overflow-y-auto pr-1"></div>
      </div>

      <div class="bg-white/95 p-5 md:p-6 rounded-2xl shadow-xl lg:col-span-3">
        <div class="flex justify-between items-center mb-4">
          <h2 id="teacher-form-title" class="text-xl font-bold text-blue-600">Thêm Bài Tập Mới</h2>
          <button id="btn-clear-edit" class="hidden text-xs bg-red-100 text-red-600 px-2.5 py-1.5 rounded-lg hover:bg-red-200 transition-colors">Hủy sửa / Tạo bài mới</button>
        </div>
        
        <input type="text" id="input-title" placeholder="Nhập tiêu đề bài tập (VD: Bài 1 - HSK1)" class="w-full border rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-400 outline-none transition-all font-semibold mb-4 bg-blue-50/50">

        <div class="mb-5 border-2 border-dashed border-blue-300 p-4 rounded-xl text-center bg-blue-50/20">
          <p class="mb-2 text-xs text-gray-600">Tải file Excel (.xlsx). Cột tự nhận diện: <b class="text-blue-600">Từ mới, Phiên âm, Nghĩa</b>.</p>
          <input type="file" id="excel-upload" title="Chọn file excel" accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-1.5 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer"/>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
          <input type="text" id="input-tumoi" placeholder="Từ mới" class="border rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
          <input type="text" id="input-phienam" placeholder="Phiên âm (Pinyin)" class="border rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
          <input type="text" id="input-nghia" placeholder="Nghĩa" class="border rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
        </div>
        <button id="btn-add-word" class="w-full bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 active:scale-95 transition-all mb-5 text-sm font-medium">Thêm từ vào danh sách</button>

        <div class="overflow-x-auto max-h-52 border rounded-lg shadow-inner bg-gray-50">
          <table class="w-full text-left border-collapse text-sm">
            <thead>
              <tr class="bg-gray-100 sticky top-0 shadow-sm">
                <th class="p-3">Từ mới</th><th class="p-3">Phiên âm</th><th class="p-3">Nghĩa</th><th class="p-3 text-center w-16">Xóa</th>
              </tr>
            </thead>
            <tbody id="teacher-word-list" class="divide-y bg-white"></tbody>
          </table>
        </div>
        <button id="btn-save-exercise" class="mt-5 w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 active:scale-95 transition-all shadow-md">Lưu Bài Tập Lên Đám Mây (Cloud)</button>
      </div>
    </div>

    <div id="page-student-list" class="page-section hidden w-full max-w-3xl">
      <h2 class="text-2xl font-bold mb-6 text-gray-800 drop-shadow-sm text-center">Danh sách Bài tập</h2>
      <div id="exercise-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <div id="page-student-quiz" class="page-section hidden w-full bg-white p-5 md:p-8 rounded-2xl shadow-xl max-w-2xl mx-auto">
      <button id="btn-back-exercises" class="text-gray-500 hover:text-gray-800 mb-4 inline-block font-medium text-sm transition-colors">← Quay lại danh sách</button>
      
      <div id="quiz-setup" class="mb-6 bg-gray-50 p-4 rounded-xl border">
        <h3 class="font-bold mb-3 text-gray-700 text-sm">Chọn thông tin làm từ gợi ý (Câu hỏi):</h3>
        <div class="flex flex-wrap gap-4 text-sm">
          <label class="cursor-pointer flex items-center gap-2 font-medium"><input type="radio" name="prompt_type" value="tumoi" checked class="w-4 h-4 text-blue-600"> Từ mới</label>
          <label class="cursor-pointer flex items-center gap-2 font-medium"><input type="radio" name="prompt_type" value="phienam" class="w-4 h-4 text-blue-600"> Phiên âm</label>
          <label class="cursor-pointer flex items-center gap-2 font-medium"><input type="radio" name="prompt_type" value="nghia" class="w-4 h-4 text-blue-600"> Nghĩa</label>
        </div>
        <button id="btn-start-quiz" class="mt-4 w-full bg-blue-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 transition-all active:scale-95 text-sm">Bắt đầu làm bài</button>
      </div>

      <div id="quiz-area" class="hidden text-center relative">
        <div class="mb-2 text-xs md:text-sm text-gray-400 font-bold tracking-wider uppercase flex justify-between items-center">
          <span id="quiz-progress">Từ 1 / 10</span>
          <button id="btn-skip-word" class="bg-gray-200 text-gray-700 px-3 py-1 rounded hover:bg-gray-300 transition-colors">Bỏ qua ⏭</button>
        </div>
        <div class="mb-8 py-6 border-b border-gray-100 flex flex-col items-center justify-center min-h-[120px]" id="quiz-prompt-container">
          <div class="text-5xl font-bold text-blue-600" id="quiz-prompt">---</div>
          <div class="text-2xl text-gray-400 mt-2 font-medium hidden" id="quiz-pinyin">---</div>
        </div>
        
        <div class="grid grid-cols-1 gap-4 max-w-sm mx-auto" id="quiz-inputs-container"></div>
      </div>
    </div>

  </main>

  <script>
    // -------------------------------------------------------------
    // CẤU HÌNH FIREBASE - DÁN ĐOẠN MÃ CỦA BẠN VÀO ĐÂY
    // -------------------------------------------------------------
    const firebaseConfig = {
  apiKey: "AIzaSyBynCOxVhtr5wp2d9miPDkwkzjma7C70Ik",
  authDomain: "luyentiengtrung-fd6ed.firebaseapp.com",
  databaseURL: "https://luyentiengtrung-fd6ed-default-rtdb.firebaseio.com",
  projectId: "luyentiengtrung-fd6ed",
  storageBucket: "luyentiengtrung-fd6ed.firebasestorage.app",
  messagingSenderId: "1001015127985",
  appId: "1:1001015127985:web:0548f63c11325b40f05790",
  measurementId: "G-QB3PNTRMMC"
};
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();
    // -------------------------------------------------------------

    let currentUser = null;
    let currentExercise = []; 
    let savedExercises = []; 
    let activeQuiz = null; 
    let activeExerciseId = null;
    let quizCurrentIndex = 0;
    let quizPromptType = 'tumoi'; 
    let editingExerciseId = null; 

    const pages = {
      login: document.getElementById('page-login'),
      role: document.getElementById('page-role'),
      teacher: document.getElementById('page-teacher'),
      studentList: document.getElementById('page-student-list'),
      studentQuiz: document.getElementById('page-student-quiz')
    };

    function showPage(pageId) {
      Object.values(pages).forEach(p => p.classList.add('hidden'));
      pages[pageId].classList.remove('hidden');
      const nav = document.getElementById('navbar');
      if (pageId === 'login') nav.classList.add('hidden');
      else nav.classList.remove('hidden');
    }

    // --- AUTHENTICATION (GOOGLE LOGIN) ---
    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        document.getElementById('user-info').innerText = `👤 ${user.displayName}`;
        showPage('role');
      } else {
        currentUser = null;
        showPage('login');
      }
    });

    document.getElementById('btn-google-login').addEventListener('click', () => {
      auth.signInWithPopup(provider).catch(error => {
        alert("Lỗi đăng nhập Google: " + error.message + "\n(Vui lòng kiểm tra đã bật Google Auth trong Firebase chưa!)");
      });
    });

    document.getElementById('btn-logout').addEventListener('click', () => auth.signOut());
    document.getElementById('btn-switch-role').addEventListener('click', () => { resetTeacherForm(); showPage('role'); });

    // --- CLOUD SYNC ---
    database.ref('exercises').on('value', (snapshot) => {
      const data = snapshot.val();
      savedExercises = data ? Object.values(data) : [];
      if (!pages.studentList.classList.contains('hidden')) renderStudentExercises();
      if (!pages.teacher.classList.contains('hidden')) renderTeacherExerciseList();
    });

    document.getElementById('role-teacher').addEventListener('click', () => {
      resetTeacherForm(); renderTeacherExerciseList(); showPage('teacher');
    });
    document.getElementById('role-student').addEventListener('click', () => {
      renderStudentExercises(); showPage('studentList');
    });

    // --- GIẢNG VIÊN (TEACHER LOGIC) ---
    function renderTeacherList() {
      const tbody = document.getElementById('teacher-word-list');
      tbody.innerHTML = currentExercise.map((word, idx) => `
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="p-3 font-semibold text-gray-800">${word.tumoi}</td>
          <td class="p-3 text-gray-600">${word.phienam}</td>
          <td class="p-3 text-gray-600">${word.nghia}</td>
          <td class="p-3 text-center">
            <button onclick="removeWord(${idx})" class="text-red-500 hover:text-red-700 bg-red-50 p-1.5 rounded font-bold">🗑</button>
          </td>
        </tr>
      `).join('');
    }

    window.removeWord = (idx) => {
      currentExercise.splice(idx, 1);
      renderTeacherList();
    };

    function renderTeacherExerciseList() {
      const container = document.getElementById('teacher-exercise-list');
      if (savedExercises.length === 0) return container.innerHTML = `<p class="text-xs text-gray-400 text-center py-4">Chưa có bài tập.</p>`;
      const sorted = [...savedExercises].reverse();
      container.innerHTML = sorted.map(ex => `
        <div class="p-3 rounded-xl border bg-gray-50 flex justify-between items-center gap-2 text-xs ${editingExerciseId === ex.id ? 'ring-2 ring-blue-500 bg-blue-50/50' : ''}">
          <div class="overflow-hidden">
            <p class="font-bold text-gray-700 truncate">${ex.title}</p>
            <p class="text-gray-400 text-[10px] mt-0.5">${ex.date} | ${ex.words.length} từ</p>
          </div>
          <button onclick="startEditExercise(${ex.id})" class="bg-blue-500 text-white px-3 py-1.5 rounded-md hover:bg-blue-600 transition-colors font-medium shrink-0">Sửa</button>
        </div>
      `).join('');
    }

    window.startEditExercise = (id) => {
      const selected = savedExercises.find(ex => ex.id === id);
      if (!selected) return;
      editingExerciseId = id;
      currentExercise = [...selected.words];
      document.getElementById('input-title').value = selected.title;
      
      document.getElementById('teacher-form-title').innerText = `Sửa Bài Tập`;
      document.getElementById('btn-clear-edit').classList.remove('hidden');
      document.getElementById('btn-save-exercise').innerText = "Cập Nhật Bài Lên Cloud";
      document.getElementById('btn-save-exercise').classList.replace('bg-green-500', 'bg-blue-600');
      document.getElementById('btn-save-exercise').classList.replace('hover:bg-green-600', 'hover:bg-blue-700');
      renderTeacherList(); renderTeacherExerciseList();
    };

    function resetTeacherForm() {
      editingExerciseId = null; currentExercise = [];
      document.getElementById('input-title').value = '';
      document.getElementById('teacher-form-title').innerText = "Thêm Bài Tập Mới";
      document.getElementById('btn-clear-edit').classList.add('hidden');
      document.getElementById('btn-save-exercise').innerText = "Lưu Bài Tập Mới Lên Cloud";
      document.getElementById('btn-save-exercise').classList.replace('bg-blue-600', 'bg-green-500');
      document.getElementById('btn-save-exercise').classList.replace('hover:bg-blue-700', 'hover:bg-green-600');
      renderTeacherList();
    }

    document.getElementById('btn-clear-edit').addEventListener('click', () => { resetTeacherForm(); renderTeacherExerciseList(); });

    document.getElementById('btn-add-word').addEventListener('click', () => {
      const tumoi = document.getElementById('input-tumoi').value.trim();
      const phienam = document.getElementById('input-phienam').value.trim();
      const nghia = document.getElementById('input-nghia').value.trim();
      if (tumoi && phienam && nghia) {
        currentExercise.push({ tumoi, phienam, nghia });
        renderTeacherList();
        document.getElementById('input-tumoi').value = ''; document.getElementById('input-phienam').value = ''; document.getElementById('input-nghia').value = '';
      } else alert("Vui lòng nhập đủ Từ mới, Phiên âm và Nghĩa!");
    });

    document.getElementById('excel-upload').addEventListener('change', (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (evt) => {
        const data = new Uint8Array(evt.target.result);
        const json = XLSX.utils.sheet_to_json(XLSX.read(data, { type: 'array' }).Sheets[XLSX.read(data, { type: 'array' }).SheetNames[0]], { header: 1 });
        let headerRowIdx = -1; let colMap = { tumoi: -1, phienam: -1, nghia: -1 };

        for (let i = 0; i < json.length; i++) {
          if (!json[i]) continue;
          let tM = -1, pA = -1, ng = -1;
          json[i].forEach((cell, idx) => {
            if (cell) {
              const val = String(cell).trim().toLowerCase();
              if (val === "từ mới" || val === "tumoi") tM = idx;
              else if (val === "phiên âm" || val === "phienam") pA = idx;
              else if (val === "nghĩa" || val === "nghia") ng = idx;
            }
          });
          if (tM !== -1 && pA !== -1 && ng !== -1) { headerRowIdx = i; colMap = { tumoi: tM, phienam: pA, nghia: ng }; break; }
        }

        if (headerRowIdx !== -1) {
          let count = 0;
          for (let i = headerRowIdx + 1; i < json.length; i++) {
            if (!json[i]) continue;
            const row = json[i];
            const t = row[colMap.tumoi] ? String(row[colMap.tumoi]).trim() : "";
            const p = row[colMap.phienam] ? String(row[colMap.phienam]).trim() : "";
            const n = row[colMap.nghia] ? String(row[colMap.nghia]).trim() : "";
            if (t !== "") { currentExercise.push({ tumoi: t, phienam: p, nghia: n }); count++; }
          }
          if (count > 0) { renderTeacherList(); alert(`Đã trích xuất ${count} từ.`); }
        } else alert("LỖI: Excel thiếu cột (Từ mới, Phiên âm, Nghĩa)!");
      };
      reader.readAsArrayBuffer(file); e.target.value = '';
    });

    document.getElementById('btn-save-exercise').addEventListener('click', () => {
      if (currentExercise.length === 0) return alert("Chưa có từ vựng nào!");
      const title = document.getElementById('input-title').value.trim() || `Bài tập tự do (${new Date().toLocaleDateString('vi-VN')})`;
      const isEditing = editingExerciseId !== null;
      const exerciseId = isEditing ? editingExerciseId : Date.now();
      
      const targetExercise = {
        id: exerciseId,
        title: title,
        date: isEditing ? savedExercises.find(ex => ex.id === exerciseId).date : new Date().toLocaleDateString('vi-VN'),
        words: [...currentExercise]
      };

      database.ref('exercises/' + exerciseId).set(targetExercise).then(() => {
        alert(isEditing ? "Cập nhật thành công!" : "Tạo bài mới thành công!");
        resetTeacherForm(); renderTeacherExerciseList();
      }).catch(err => alert("Lỗi: " + err.message));
    });

    // --- SINH VIÊN (STUDENT LOGIC) ---
    function renderStudentExercises() {
      const container = document.getElementById('exercise-list');
      if (savedExercises.length === 0) return container.innerHTML = `<p class="col-span-full text-center text-gray-500 bg-white p-6 rounded-xl border">Chưa có bài tập.</p>`;
      const sorted = [...savedExercises].reverse();
      
      // Fetch user progress to display
      database.ref(`progress/${currentUser.uid}`).once('value').then(snap => {
        const progressData = snap.val() || {};
        container.innerHTML = sorted.map(ex => {
          const prog = progressData[ex.id];
          let statusHtml = `<span class="text-gray-400">Chưa làm</span>`;
          if (prog && prog.currentIndex > 0) {
            statusHtml = prog.currentIndex >= ex.words.length ? `<span class="text-green-500 font-bold">Hoàn thành ✔</span>` : `<span class="text-orange-500 font-bold">Đang làm (${prog.currentIndex}/${ex.words.length})</span>`;
          }
          return `
            <div class="bg-white p-5 rounded-xl shadow border border-gray-100 cursor-pointer hover:shadow-md hover:ring-2 hover:ring-blue-400 transition-all active:scale-95" onclick="openQuizById(${ex.id})">
              <h3 class="font-bold text-lg text-blue-600">${ex.title}</h3>
              <p class="text-xs text-gray-500 mt-2 flex justify-between">
                <span>Số từ: ${ex.words.length} | ${ex.date}</span>
                ${statusHtml}
              </p>
            </div>
          `;
        }).join('');
      });
    }

    window.openQuizById = (id) => {
      activeExerciseId = id;
      const selected = savedExercises.find(ex => ex.id === id);
      activeQuiz = selected.words;
      
      database.ref(`progress/${currentUser.uid}/${id}`).once('value').then(snap => {
        const prog = snap.val();
        if (prog && prog.currentIndex > 0 && prog.currentIndex < activeQuiz.length) {
          if(confirm(`Bạn đang làm dở đến từ thứ ${prog.currentIndex}.\n\nChọn [OK] để LÀM TIẾP.\nChọn [Hủy/Cancel] để LÀM LẠI TỪ ĐẦU.`)) {
            quizCurrentIndex = prog.currentIndex;
          } else {
            quizCurrentIndex = 0;
            saveProgress(); // Reset về 0
          }
        } else {
          quizCurrentIndex = 0;
        }
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('quiz-setup').classList.remove('hidden');
        showPage('studentQuiz');
      });
    };

    document.getElementById('btn-back-exercises').addEventListener('click', () => {
      renderStudentExercises();
      showPage('studentList');
    });

    document.getElementById('btn-start-quiz').addEventListener('click', () => {
      quizPromptType = document.querySelector('input[name="prompt_type"]:checked').value;
      document.getElementById('quiz-setup').classList.add('hidden');
      document.getElementById('quiz-area').classList.remove('hidden');
      loadQuizWord();
    });

    function saveProgress() {
      if(!currentUser || !activeExerciseId) return;
      database.ref(`progress/${currentUser.uid}/${activeExerciseId}`).set({ currentIndex: quizCurrentIndex });
    }

    function loadQuizWord() {
      if (quizCurrentIndex >= activeQuiz.length) {
        alert("🎉 Chúc mừng bạn đã hoàn thành bài tập!");
        saveProgress();
        renderStudentExercises();
        showPage('studentList');
        return;
      }

      const word = activeQuiz[quizCurrentIndex];
      document.getElementById('quiz-progress').innerText = `Từ ${quizCurrentIndex + 1} / ${activeQuiz.length}`;
      
      const promptEl = document.getElementById('quiz-prompt');
      const pinyinEl = document.getElementById('quiz-pinyin');
      
      promptEl.innerText = word[quizPromptType];
      
      // Hiển thị pinyin ở dưới nếu gợi ý là Từ mới
      if (quizPromptType === 'tumoi') {
        pinyinEl.innerText = word.phienam;
        pinyinEl.classList.remove('hidden');
      } else {
        pinyinEl.classList.add('hidden');
      }

      const inputContainer = document.getElementById('quiz-inputs-container');
      inputContainer.innerHTML = '';

      const fields = [
        { key: 'tumoi', label: 'Từ mới' },
        { key: 'phienam', label: 'Phiên âm (Pinyin)' },
        { key: 'nghia', label: 'Nghĩa' }
      ].filter(f => f.key !== quizPromptType);

      fields.forEach(field => {
        const input = document.createElement('input');
        input.type = 'text'; input.placeholder = `Nhập ${field.label}`;
        input.dataset.key = field.key; input.dataset.correct = word[field.key];
        input.className = "quiz-input border-2 p-3.5 rounded-xl text-base text-center outline-none focus:border-blue-400 transition-all font-semibold bg-gray-50";
        input.addEventListener('change', checkInput);
        inputContainer.appendChild(input);
      });
      
      setTimeout(() => { const firstInp = inputContainer.querySelector('input'); if(firstInp) firstInp.focus(); }, 100);
    }

    document.getElementById('btn-skip-word').addEventListener('click', () => {
      quizCurrentIndex++;
      saveProgress();
      loadQuizWord();
    });

    function checkInput(e) {
      const input = e.target;
      const correctVal = input.dataset.correct.toLowerCase().trim();
      const userVal = input.value.toLowerCase().trim();

      if (userVal === correctVal) {
        input.classList.remove('border-red-500', 'text-red-500', 'shake');
        input.classList.add('border-green-500', 'text-green-600', 'bg-green-50');
        input.disabled = true;
        checkAllDone();
      } else if (userVal !== '') {
        input.classList.add('border-red-500', 'text-red-500', 'shake');
        setTimeout(() => { input.value = ''; input.classList.remove('shake'); }, 400);
      }
    }

    function checkAllDone() {
      const inputs = document.querySelectorAll('.quiz-input');
      const allCorrect = Array.from(inputs).every(inp => inp.disabled);
      if (allCorrect) {
        quizCurrentIndex++;
        saveProgress();
        setTimeout(() => loadQuizWord(), 800); 
      }
    }

    showPage('login');
  </script>
</body>
</html>
