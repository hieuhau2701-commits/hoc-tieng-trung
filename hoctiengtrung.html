<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ứng Dụng Học Tiếng Trung</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pulse-soft': 'pulseSoft 2s infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        pulseSoft: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.02)' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- Thư viện đọc file Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Hiệu ứng Nút bấm & Thẻ Card */
        .btn-effect {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-effect:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .btn-effect:active {
            transform: scale(0.96) translateY(0);
            box-shadow: none;
        }

        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: #3b82f6; /* Blue 500 */
        }

        /* Nền Gradient chuyển động */
        .bg-animated-light {
            background: linear-gradient(-45deg, #f0fdfa, #e0f2fe, #f5f3ff, #f0fdfa);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        .bg-animated-dark {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #toast-container {
            position: fixed; bottom: 20px; right: 20px; left: 20px; z-index: 50;
            display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        @media (min-width: 640px) { #toast-container { left: auto; } }
    </style>
</head>
<body id="body-bg" class="min-h-screen flex flex-col bg-animated-light text-slate-800 dark:bg-animated-dark dark:text-gray-100 transition-colors duration-500">

    <div id="toast-container"></div>

    <!-- Header (Có hiệu ứng kính mờ glassmorphism) -->
    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm p-3 sm:p-4 sticky top-0 z-20 transition-colors duration-500 border-b border-gray-200 dark:border-slate-700">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-lg sm:text-xl font-bold flex items-center gap-2 text-teal-600 dark:text-teal-400 cursor-pointer btn-effect" onclick="window.render()">
                <span class="text-2xl">🇨🇳</span> <span class="hidden sm:inline">Tiếng Trung Pro</span>
            </h1>
            <div class="flex items-center gap-2 sm:gap-4">
                <button onclick="window.toggleTheme()" class="p-2 bg-gray-100 dark:bg-slate-800 hover:bg-gray-200 dark:hover:bg-slate-700 rounded-full btn-effect" aria-label="Đổi giao diện">
                    <span id="theme-icon" class="text-xl">🌙</span>
                </button>

                <div id="user-info" class="hidden text-sm font-medium flex items-center gap-2 sm:gap-3 bg-gray-50 dark:bg-slate-800 p-1.5 pr-2 rounded-full border border-gray-200 dark:border-slate-700">
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff" class="w-8 h-8 rounded-full shadow-sm" alt="Avatar">
                    <div class="hidden md:flex flex-col">
                        <span id="welcome-text" class="text-xs font-bold truncate max-w-[100px]"></span>
                        <span id="role-text" class="text-[10px] text-gray-500 dark:text-gray-400"></span>
                    </div>
                    <button onclick="window.showRoleSelection()" title="Đổi vai trò" class="ml-1 p-1.5 bg-indigo-100 text-indigo-600 dark:bg-indigo-900/50 dark:text-indigo-400 rounded-full hover:bg-indigo-200 btn-effect">
                        🔄
                    </button>
                    <button onclick="window.handleLogout()" title="Đăng xuất" class="p-1.5 bg-red-100 text-red-600 dark:bg-red-900/50 dark:text-red-400 rounded-full hover:bg-red-200 btn-effect">
                        🚪
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-grow flex items-center justify-center p-4 max-w-4xl mx-auto w-full relative z-10">
        <!-- Loading -->
        <div class="text-teal-600 dark:text-teal-400 flex flex-col items-center animate-slide-up">
            <svg class="animate-spin h-12 w-12 mb-4 drop-shadow-md" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="font-medium tracking-wide">Đang kết nối máy chủ...</p>
        </div>
    </main>

    <script type="module">
        // --- FIREBASE IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- THEME MANAGEMENT ---
        window.toggleTheme = () => {
            const html = document.documentElement;
            const body = document.getElementById('body-bg');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                body.classList.replace('bg-animated-dark', 'bg-animated-light');
                document.getElementById('theme-icon').textContent = '🌙';
            } else {
                html.classList.add('dark');
                body.classList.replace('bg-animated-light', 'bg-animated-dark');
                document.getElementById('theme-icon').textContent = '☀️';
            }
        };

        // --- STATE MANAGEMENT ---
        let auth = null;
        let db = null;
        let authUser = null; // Object người dùng từ Firebase Auth
        let userRole = null; // 'teacher' | 'student'
        let lessons = [];
        let practiceState = { lesson: null, mode: null, currentWordIndex: 0, field1Passed: false, field2Passed: false };
        let appId = typeof __app_id !== 'undefined' ? __app_id : 'tieng-trung-pro-app';

        const contentDiv = document.getElementById('app-content');
        const userInfoDiv = document.getElementById('user-info');

        // --- HỆ THỐNG THÔNG BÁO ---
        window.showNotification = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgClass = type === 'error' ? 'bg-red-500' : (type === 'warning' ? 'bg-orange-500' : 'bg-teal-500');
            toast.className = `${bgClass} text-white px-5 py-3.5 rounded-2xl shadow-xl animate-slide-up font-medium flex items-center gap-3 text-sm sm:text-base mx-auto w-full sm:w-auto sm:max-w-md`;
            toast.innerHTML = `<span class="text-xl">${type === 'error' ? '⚠️' : (type === 'warning' ? '⚡' : '✨')}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.4s ease'; setTimeout(() => toast.remove(), 400); }, 3000);
        };

        // --- KHỞI TẠO ỨNG DỤNG ---
        async function initApp() {
            try {
                if (typeof __firebase_config !== 'undefined') {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    // Bắt buộc xác thực ban đầu theo quy tắc nền tảng
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, async (user) => {
                        if (user) {
                            authUser = user;
                            await fetchUserProfile();
                            
                            // Lắng nghe dữ liệu bài học chung
                            const lessonsRef = collection(db, 'artifacts', appId, 'public', 'data', 'lessons');
                            onSnapshot(lessonsRef, (snapshot) => {
                                lessons = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                lessons.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                                render(); // Cập nhật giao diện khi có dữ liệu mới
                            });
                        } else {
                            authUser = null;
                            userRole = null;
                            render();
                        }
                    });
                } else {
                    window.showNotification("Chạy offline: Đăng nhập Google không khả dụng.", "warning");
                    render();
                }
            } catch (error) {
                console.error("Init error:", error);
                render();
            }
        }

        // Fetch vai trò từ Firestore
        async function fetchUserProfile() {
            if (!authUser || !db) return;
            try {
                const profileRef = doc(db, 'artifacts', appId, 'users', authUser.uid, 'profile', 'info');
                const docSnap = await getDoc(profileRef);
                if (docSnap.exists()) {
                    userRole = docSnap.data().role;
                } else {
                    userRole = null;
                }
            } catch (e) { console.error("Lỗi lấy profile", e); }
        }

        // --- ĐIỀU HƯỚNG GIAO DIỆN CHÍNH ---
        window.render = () => {
            if (!authUser || authUser.isAnonymous) {
                // Nếu chưa đăng nhập Google thật sự (chỉ là ẩn danh của hệ thống) -> Hiện trang đăng nhập
                userInfoDiv.classList.add('hidden');
                window.renderLogin();
            } else if (!userRole) {
                // Đã đăng nhập nhưng chưa chọn vai trò
                userInfoDiv.classList.add('hidden');
                window.showRoleSelection();
            } else {
                // Đã có đủ thông tin
                userInfoDiv.classList.remove('hidden');
                document.getElementById('welcome-text').textContent = authUser.displayName || 'Người dùng';
                document.getElementById('role-text').textContent = userRole === 'teacher' ? 'Giảng Viên' : 'Sinh Viên';
                document.getElementById('user-avatar').src = authUser.photoURL || `https://ui-avatars.com/api/?name=${authUser.displayName || 'U'}&background=random`;
                
                if (userRole === 'teacher') window.renderTeacherDashboard();
                else window.renderStudentDashboard();
            }
        };

        // --- XỬ LÝ AUTH LOGIC ---
        window.handleGoogleLogin = async () => {
            if (!auth) return window.showNotification("Lỗi kết nối máy chủ.", "error");
            const provider = new GoogleAuthProvider();
            try {
                // Giao diện loading trên nút bấm
                document.getElementById('btn-google-login').innerHTML = '<svg class="animate-spin h-5 w-5 mr-3 inline" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Đang kết nối...';
                
                const result = await signInWithPopup(auth, provider);
                authUser = result.user;
                await fetchUserProfile();
                window.showNotification(`Đăng nhập thành công! Chào ${authUser.displayName}`, "success");
                render();
            } catch (error) {
                console.error(error);
                document.getElementById('btn-google-login').innerHTML = '<img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6 mr-3" alt="Google"> Đăng nhập bằng Google';
                if(error.code !== 'auth/popup-closed-by-user') {
                    window.showNotification("Lỗi Google: Bạn đang ở môi trường Xem Trước. Hãy đưa code lên GitHub để dùng tính năng này.", "warning");
                    // Fallback giả lập đăng nhập cho môi trường preview
                    window.simulateLogin();
                }
            }
        };

        // Fallback cho môi trường không hỗ trợ Popup Google
        window.simulateLogin = () => {
            authUser = { uid: 'demo-user-123', displayName: 'Giáo sư Test', photoURL: null };
            render();
        }

        window.handleLogout = async () => {
            if(auth) await signOut(auth);
            authUser = null; userRole = null;
            render();
        };

        window.saveRole = async (role) => {
            if (!authUser || !db) return;
            try {
                const profileRef = doc(db, 'artifacts', appId, 'users', authUser.uid, 'profile', 'info');
                await setDoc(profileRef, { 
                    role: role, 
                    name: authUser.displayName || 'Người dùng',
                    updatedAt: Date.now()
                }, { merge: true });
                userRole = role;
                window.showNotification("Đã cập nhật vai trò!", "success");
                render();
            } catch (e) {
                window.showNotification("Lỗi lưu vai trò: " + e.message, "error");
            }
        };

        // --- MÀN HÌNH ĐĂNG NHẬP ---
        window.renderLogin = () => {
            contentDiv.innerHTML = `
                <div class="bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl p-8 sm:p-10 rounded-[2rem] shadow-2xl w-full max-w-md animate-slide-up border border-white/20 dark:border-slate-700 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-teal-400 via-blue-500 to-indigo-500"></div>
                    <div class="text-center mb-10 mt-2">
                        <div class="w-20 h-20 bg-teal-100 dark:bg-teal-900/50 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse-soft">
                            <span class="text-4xl">🇨🇳</span>
                        </div>
                        <h2 class="text-3xl font-extrabold text-slate-800 dark:text-white tracking-tight">Xin chào!</h2>
                        <p class="text-slate-500 dark:text-slate-400 mt-2">Đăng nhập để lưu trữ tiến trình học tập của bạn.</p>
                    </div>
                    
                    <button id="btn-google-login" onclick="window.handleGoogleLogin()" class="btn-effect w-full bg-white dark:bg-slate-700 hover:bg-gray-50 dark:hover:bg-slate-600 text-slate-700 dark:text-white font-semibold py-4 px-4 rounded-2xl border border-gray-200 dark:border-slate-600 shadow-sm flex items-center justify-center text-lg relative overflow-hidden group">
                        <span class="absolute inset-0 w-full h-full bg-slate-100 dark:bg-slate-600 opacity-0 group-hover:opacity-100 transition-opacity"></span>
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6 mr-3 relative z-10" alt="Google"> 
                        <span class="relative z-10">Đăng nhập bằng Google</span>
                    </button>
                    
                    <p class="text-center text-xs text-slate-400 dark:text-slate-500 mt-8">Bằng việc đăng nhập, bạn đồng ý với điều khoản sử dụng.</p>
                </div>
            `;
        };

        // --- MÀN HÌNH CHỌN VAI TRÒ ---
        window.showRoleSelection = () => {
            contentDiv.innerHTML = `
                <div class="w-full max-w-2xl animate-slide-up">
                    <div class="text-center mb-8">
                        <h2 class="text-3xl md:text-4xl font-extrabold text-slate-800 dark:text-white drop-shadow-sm">Bạn là ai?</h2>
                        <p class="text-slate-600 dark:text-slate-300 mt-3 text-lg">Chọn vai trò để bắt đầu trải nghiệm phù hợp</p>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <!-- Card Giảng Viên -->
                        <div onclick="window.saveRole('teacher')" class="card-hover cursor-pointer bg-white/90 dark:bg-slate-800/90 backdrop-blur-lg p-8 rounded-[2rem] border-2 border-transparent hover:border-teal-500 dark:hover:border-teal-400 shadow-xl text-center group relative overflow-hidden">
                            <div class="absolute inset-0 bg-teal-50 dark:bg-teal-900/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                            <div class="relative z-10">
                                <div class="w-24 h-24 bg-teal-100 dark:bg-teal-900/40 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-300">
                                    <span class="text-5xl">👨‍🏫</span>
                                </div>
                                <h3 class="text-2xl font-bold text-slate-800 dark:text-white mb-2">Giảng Viên</h3>
                                <p class="text-slate-500 dark:text-slate-400 text-sm">Tạo bài học, giao bài tập từ file Excel cho sinh viên.</p>
                                <div class="mt-6 text-teal-600 dark:text-teal-400 font-semibold opacity-0 group-hover:opacity-100 transition-opacity">Chọn vai trò này &rarr;</div>
                            </div>
                        </div>

                        <!-- Card Sinh Viên -->
                        <div onclick="window.saveRole('student')" class="card-hover cursor-pointer bg-white/90 dark:bg-slate-800/90 backdrop-blur-lg p-8 rounded-[2rem] border-2 border-transparent hover:border-blue-500 dark:hover:border-blue-400 shadow-xl text-center group relative overflow-hidden">
                            <div class="absolute inset-0 bg-blue-50 dark:bg-blue-900/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                            <div class="relative z-10">
                                <div class="w-24 h-24 bg-blue-100 dark:bg-blue-900/40 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-300">
                                    <span class="text-5xl">👨‍🎓</span>
                                </div>
                                <h3 class="text-2xl font-bold text-slate-800 dark:text-white mb-2">Sinh Viên</h3>
                                <p class="text-slate-500 dark:text-slate-400 text-sm">Nhận bài tập, luyện tập gõ Pinyin, Chữ Hán và Nghĩa.</p>
                                <div class="mt-6 text-blue-600 dark:text-blue-400 font-semibold opacity-0 group-hover:opacity-100 transition-opacity">Chọn vai trò này &rarr;</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        // --- GIAO DIỆN GIẢNG VIÊN ---
        window.renderTeacherDashboard = () => {
            let lessonsHtml = lessons.map((l) => `
                <div class="card-hover bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 flex justify-between items-center mb-4 group relative overflow-hidden">
                    <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-teal-500 rounded-l-2xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="pl-2">
                        <h3 class="font-bold text-lg text-slate-800 dark:text-gray-100 group-hover:text-teal-600 dark:group-hover:text-teal-400 transition-colors">${l.title}</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1 flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                            ${l.words ? l.words.length : 0} từ vựng
                        </p>
                    </div>
                    <button class="text-slate-400 hover:text-teal-600 dark:hover:text-teal-400 btn-effect p-2 bg-slate-50 dark:bg-slate-700 rounded-xl">Chi tiết</button>
                </div>
            `).join('');

            contentDiv.innerHTML = `
                <div class="w-full max-w-3xl animate-slide-up">
                    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8 bg-white/60 dark:bg-slate-800/60 backdrop-blur-md p-6 rounded-[2rem] shadow-sm border border-white/50 dark:border-slate-700">
                        <div>
                            <h2 class="text-2xl font-extrabold text-slate-800 dark:text-white">Thư Viện Bài Học</h2>
                            <p class="text-slate-500 dark:text-slate-400 mt-1">Quản lý và giao bài tập cho sinh viên</p>
                        </div>
                        <button onclick="window.renderCreateLesson()" class="btn-effect w-full sm:w-auto bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-600 hover:to-emerald-600 text-white px-6 py-3.5 rounded-2xl shadow-lg shadow-teal-500/30 transition-all font-bold flex items-center justify-center gap-2">
                            <span class="text-xl">+</span> Tạo bài mới
                        </button>
                    </div>
                    
                    <div class="space-y-2">
                        ${lessonsHtml.length > 0 ? lessonsHtml : `
                            <div class="bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm p-12 rounded-[2rem] text-center border-2 border-dashed border-slate-300 dark:border-slate-600">
                                <div class="w-20 h-20 bg-slate-100 dark:bg-slate-700 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse-soft">
                                    <span class="text-4xl">📂</span>
                                </div>
                                <h3 class="text-lg font-bold text-slate-700 dark:text-slate-300">Chưa có bài học nào</h3>

                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                    if (json.length > 1) {
                        document.getElementById('word-list').innerHTML = '';
                        let count = 0;
                        for (let i = 1; i < json.length; i++) {
                            const r = json[i];
                            if (!r || r.length === 0) continue;
                            const zh = r[1]?String(r[1]).trim():''; const py = r[2]?String(r[2]).trim():''; const vi = r[3]?String(r[3]).trim():'';
                            if (zh || py || vi) { window.addWordRowWithValue(zh, py, vi); count++; }
                        }
                        const t = document.getElementById('lesson-title');
                        if (!t.value) t.value = file.name.replace(/\.[^/.]+$/, "");

                    }
                } catch (err) { window.showNotification('File lỗi định dạng.', "error"); }
                event.target.value = '';

            contentDiv.innerHTML = `
                <div class="w-full max-w-lg bg-white/95 dark:bg-slate-800/95 backdrop-blur-xl p-6 sm:p-10 rounded-[2.5rem] shadow-2xl animate-slide-up text-center relative pt-14 border border-white/20 dark:border-slate-700">
                    <button onclick="window.renderStudentDashboard()" class="absolute top-6 left-6 text-slate-400 hover:text-slate-800 dark:hover:text-white bg-slate-100 dark:bg-slate-700 p-2.5 rounded-full transition-colors btn-effect z-10">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </button>
                    
                    <div class="absolute top-6 right-6 flex items-center gap-2">
                        <span class="text-sm font-bold text-slate-400 dark:text-slate-500 bg-slate-100 dark:bg-slate-700 px-4 py-1.5 rounded-full">
                            <span class="text-teal-500">${practiceState.currentWordIndex + 1}</span> / ${wordList.length}
                        </span>
                    </div>
                    
                    <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-2 mb-10 overflow-hidden">
                        <div class="bg-gradient-to-r from-teal-400 to-blue-500 h-2 rounded-full transition-all duration-500 relative" style="width: ${progress}%">
                            <div class="absolute top-0 left-0 w-full h-full bg-white/20"></div>
                        </div>
                    </div>

                    <div class="mb-10 min-h-[100px] flex items-center justify-center">${clueHtml}</div>
                    
                    <div class="bg-slate-50 dark:bg-slate-800/50 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-inner">
                        ${inputsHtml}
                    </div>
                    
                    <button id="check-btn" onclick="window.checkAnswers()" class="btn-effect w-full mt-8 bg-slate-800 dark:bg-slate-100 text-white dark:text-slate-900 font-extrabold py-5 rounded-2xl shadow-xl hover:shadow-2xl transition-all text-xl flex justify-center items-center gap-2">
                        Kiểm Tra <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </button>
                </div>
            `;

            practiceState.field1Passed = false; practiceState.field2Passed = false;
            const inputs = document.querySelectorAll('input[type="text"]');
            inputs.forEach(input => { input.addEventListener('keypress', (e) => { if (e.key === 'Enter') window.checkAnswers(); }); });
        };

        window.checkAnswers = () => {
            const word = practiceState.words[practiceState.currentWordIndex];
            let i1, i2, correct1, correct2;

            if (practiceState.mode === 'show-zh') { i1 = document.getElementById('input-py'); correct1 = word.py; i2 = document.getElementById('input-vi'); correct2 = word.vi; }
            else if (practiceState.mode === 'show-py') { i1 = document.getElementById('input-zh'); correct1 = word.zh; i2 = document.getElementById('input-vi'); correct2 = word.vi; }
            else { i1 = document.getElementById('input-zh'); correct1 = word.zh; i2 = document.getElementById('input-py'); correct2 = word.py; }

            const validateField = (inputEl, correctValue) => {
                const val = inputEl.value.replace(/\s+/g, '').toLowerCase();
                const target = correctValue.replace(/\s+/g, '').toLowerCase();

                inputEl.classList.remove('border-slate-200', 'border-red-500', 'bg-red-50', 'dark:bg-red-900/20', 'border-green-500', 'bg-green-50', 'dark:bg-green-900/20', 'shake', 'text-red-600', 'dark:border-slate-700');
                void inputEl.offsetWidth;

                if (val === target) {
                    inputEl.classList.add('border-green-500', 'bg-green-50', 'dark:bg-green-900/20', 'text-green-600', 'dark:text-green-400');
                    inputEl.readOnly = true; return true;
                } else {
                    inputEl.classList.add('border-red-500', 'bg-red-50', 'dark:bg-red-900/20', 'text-red-500', 'dark:text-red-400', 'shake');
                    setTimeout(() => {
                        inputEl.value = '';
                        inputEl.classList.remove('border-red-500', 'bg-red-50', 'dark:bg-red-900/20', 'text-red-500', 'dark:text-red-400');
                        inputEl.classList.add('border-slate-200', 'dark:border-slate-700');
                        if (!practiceState.field1Passed && !practiceState.field2Passed) inputEl.focus();
                    }, 800);
                    return false;
                }
            };

            if (!practiceState.field1Passed) practiceState.field1Passed = validateField(i1, correct1);
            if (!practiceState.field2Passed) practiceState.field2Passed = validateField(i2, correct2);

            if (practiceState.field1Passed && practiceState.field2Passed) {
                const btn = document.getElementById('check-btn');
                btn.innerHTML = 'Chính xác! <svg class="w-6 h-6 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>';
                btn.className = "btn-effect w-full mt-8 bg-green-500 text-white font-extrabold py-5 rounded-2xl shadow-xl shadow-green-500/30 text-xl flex justify-center items-center";
                setTimeout(() => { practiceState.currentWordIndex++; window.renderPracticeUI(); }, 800);
            }
        };

        // Bắt đầu
        initApp();
    </script>
</body>
</html>
