<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ứng Dụng Học Tiếng Trung</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pulse-soft': 'pulseSoft 2s infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        pulseSoft: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.02)' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- Thư viện đọc file Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        .btn-effect { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-effect:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .btn-effect:active { transform: scale(0.96) translateY(0); box-shadow: none; }

        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); border-color: #3b82f6; }

        .bg-animated-light { background: linear-gradient(-45deg, #f0fdfa, #e0f2fe, #f5f3ff, #f0fdfa); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        .bg-animated-dark { background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #172554); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

        #toast-container { position: fixed; bottom: 20px; right: 20px; left: 20px; z-index: 50; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        @media (min-width: 640px) { #toast-container { left: auto; } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body id="body-bg" class="min-h-screen flex flex-col bg-animated-light text-slate-800 dark:bg-animated-dark dark:text-gray-100 transition-colors duration-500">

    <div id="toast-container"></div>

    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm p-3 sm:p-4 sticky top-0 z-20 transition-colors duration-500 border-b border-gray-200 dark:border-slate-700">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-lg sm:text-xl font-bold flex items-center gap-2 text-teal-600 dark:text-teal-400 cursor-pointer btn-effect" onclick="window.render()">
                <span class="text-2xl">🇨🇳</span> <span class="hidden sm:inline">Tiếng Trung Pro</span>
            </h1>
            <div class="flex items-center gap-2 sm:gap-4">
                <button onclick="window.toggleTheme()" class="p-2 bg-gray-100 dark:bg-slate-800 hover:bg-gray-200 dark:hover:bg-slate-700 rounded-full btn-effect">
                    <span id="theme-icon" class="text-xl">🌙</span>
                </button>

                <div id="user-info" class="hidden text-sm font-medium flex items-center gap-2 sm:gap-3 bg-gray-50 dark:bg-slate-800 p-1.5 pr-2 rounded-full border border-gray-200 dark:border-slate-700">
                    <img id="user-avatar" src="" class="w-8 h-8 rounded-full shadow-sm" alt="Avatar">
                    <div class="hidden md:flex flex-col">
                        <span id="welcome-text" class="text-xs font-bold truncate max-w-[100px]"></span>
                        <span id="role-text" class="text-[10px] text-gray-500 dark:text-gray-400"></span>
                    </div>
                    <button onclick="window.showRoleSelection()" title="Đổi vai trò" class="ml-1 p-1.5 bg-indigo-100 text-indigo-600 dark:bg-indigo-900/50 dark:text-indigo-400 rounded-full hover:bg-indigo-200 btn-effect">🔄</button>
                    <button onclick="window.handleLogout()" title="Đăng xuất" class="p-1.5 bg-red-100 text-red-600 dark:bg-red-900/50 dark:text-red-400 rounded-full hover:bg-red-200 btn-effect">🚪</button>
                </div>
            </div>
        </div>
    </header>

    <main id="app-content" class="flex-grow flex items-center justify-center p-4 max-w-4xl mx-auto w-full relative z-10"></main>

    <div id="code-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-2xl w-full max-w-md animate-slide-up border border-slate-200 dark:border-slate-700">
            <h3 id="modal-title" class="text-xl font-bold mb-4 text-slate-800 dark:text-white">...</h3>
            <textarea id="modal-textarea" class="w-full p-4 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:border-teal-500 mb-4 h-32 text-sm dark:text-white font-mono break-all" placeholder="Dán đoạn mã vào đây..."></textarea>
            <div class="flex gap-3">
                <button onclick="document.getElementById('code-modal').classList.add('hidden')" class="flex-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-white font-bold py-3 rounded-xl hover:bg-slate-300 dark:hover:bg-slate-600 transition">Đóng</button>
                <button id="modal-action-btn" class="flex-1 bg-teal-600 text-white font-bold py-3 rounded-xl hover:bg-teal-700 transition shadow-md">...</button>
            </div>
        </div>
    </div>

    <script>
        // --- THEME ---
        window.toggleTheme = () => {
            const html = document.documentElement;
            const body = document.getElementById('body-bg');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark'); body.classList.replace('bg-animated-dark', 'bg-animated-light');
                document.getElementById('theme-icon').textContent = '🌙';
            } else {
                html.classList.add('dark'); body.classList.replace('bg-animated-light', 'bg-animated-dark');
                document.getElementById('theme-icon').textContent = '☀️';
            }
        };

        // --- STATE & LOCAL STORAGE ---
        let authUser = JSON.parse(localStorage.getItem('tt_user')) || null; 
        let lessons = JSON.parse(localStorage.getItem('tt_lessons')) || [];
        let practiceState = { lesson: null, mode: null, currentWordIndex: 0, field1Passed: false, field2Passed: false };

        const contentDiv = document.getElementById('app-content');
        const userInfoDiv = document.getElementById('user-info');

        window.showNotification = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgClass = type === 'error' ? 'bg-red-500' : (type === 'warning' ? 'bg-orange-500' : 'bg-teal-500');
            toast.className = `${bgClass} text-white px-5 py-3.5 rounded-2xl shadow-xl animate-slide-up font-medium flex items-center gap-3 text-sm sm:text-base mx-auto w-full sm:w-auto sm:max-w-md`;
            toast.innerHTML = `<span class="text-xl">${type === 'error' ? '⚠️' : (type === 'warning' ? '⚡' : '✨')}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.4s ease'; setTimeout(() => toast.remove(), 400); }, 3000);
        };

        window.render = () => {
            if (!authUser) {
                userInfoDiv.classList.add('hidden');
                window.renderLogin();
            } else if (!authUser.role) {
                userInfoDiv.classList.add('hidden');
                window.showRoleSelection();
            } else {
                userInfoDiv.classList.remove('hidden');
                document.getElementById('welcome-text').textContent = authUser.name;
                document.getElementById('role-text').textContent = authUser.role === 'teacher' ? 'Giảng Viên' : 'Sinh Viên';
                document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${authUser.name}&background=0D8ABC&color=fff`;
                
                if (authUser.role === 'teacher') window.renderTeacherDashboard();
                else window.renderStudentDashboard();
            }
        };

        window.handleLogin = () => {
            const nameInput = document.getElementById('user-name-input');
            const name = nameInput ? nameInput.value.trim() : '';
            if(name) {
                authUser = { id: Date.now().toString(), name: name, role: null };
                localStorage.setItem('tt_user', JSON.stringify(authUser));
                window.showNotification(`Đăng nhập thành công! Chào ${name}`, "success");
                render();
            } else {
                window.showNotification("Vui lòng nhập tên của bạn!", "warning");
            }
        };

        window.handleLogout = () => { authUser = null; localStorage.removeItem('tt_user'); render(); };

        window.saveRole = (role) => {
            authUser.role = role; localStorage.setItem('tt_user', JSON.stringify(authUser));
            window.showNotification("Đã cập nhật vai trò!", "success"); render();
        };

        window.renderLogin = () => {
            contentDiv.innerHTML = `
                <div class="bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl p-8 sm:p-10 rounded-[2rem] shadow-2xl w-full max-w-md animate-slide-up border border-white/20 dark:border-slate-700 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-teal-400 via-blue-500 to-indigo-500"></div>
                    <div class="text-center mb-8 mt-2">
                        <div class="w-20 h-20 bg-teal-100 dark:bg-teal-900/50 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse-soft"><span class="text-4xl">🇨🇳</span></div>
                        <h2 class="text-3xl font-extrabold text-slate-800 dark:text-white tracking-tight">Xin chào!</h2>
                        <p class="text-slate-500 dark:text-slate-400 mt-2">Ứng dụng đã được chuyển sang chế độ Siêu mượt. Dữ liệu lưu trực tiếp trên thiết bị của bạn.</p>
                    </div>
                    <div class="mb-6">
                        <input type="text" id="user-name-input" placeholder="Nhập tên của bạn để bắt đầu..." class="w-full p-4 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-2xl focus:border-teal-500 focus:ring-4 outline-none font-bold dark:text-white text-lg text-center shadow-inner transition-all" value="Người học chăm chỉ">
                    </div>
                    <button onclick="window.handleLogin()" class="btn-effect w-full bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-600 hover:to-emerald-600 text-white font-bold py-4 px-4 rounded-2xl shadow-lg flex items-center justify-center text-lg gap-2">Bắt Đầu Ngay 🚀</button>
                </div>
            `;
        };

        window.showRoleSelection = () => {
            contentDiv.innerHTML = `
                <div class="w-full max-w-2xl animate-slide-up">
                    <div class="text-center mb-8">
                        <h2 class="text-3xl md:text-4xl font-extrabold text-slate-800 dark:text-white">Bạn là ai?</h2>
                        <p class="text-slate-600 dark:text-slate-300 mt-3 text-lg">Chọn vai trò để bắt đầu</p>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div onclick="window.saveRole('teacher')" class="card-hover cursor-pointer bg-white/90 dark:bg-slate-800/90 p-8 rounded-[2rem] border-2 border-transparent hover:border-teal-500 shadow-xl text-center group">
                            <div class="w-24 h-24 bg-teal-100 dark:bg-teal-900/40 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform"><span class="text-5xl">👨‍🏫</span></div>
                            <h3 class="text-2xl font-bold text-slate-800 dark:text-white mb-2">Giảng Viên</h3>
                            <p class="text-slate-500 dark:text-slate-400 text-sm">Tạo bài học, và Chia sẻ Mã Bài Tập cho sinh viên.</p>
                        </div>
                        <div onclick="window.saveRole('student')" class="card-hover cursor-pointer bg-white/90 dark:bg-slate-800/90 p-8 rounded-[2rem] border-2 border-transparent hover:border-blue-500 shadow-xl text-center group">
                            <div class="w-24 h-24 bg-blue-100 dark:bg-blue-900/40 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform"><span class="text-5xl">👨‍🎓</span></div>
                            <h3 class="text-2xl font-bold text-slate-800 dark:text-white mb-2">Sinh Viên</h3>
                            <p class="text-slate-500 dark:text-slate-400 text-sm">Nhập mã bài tập được giao, luyện gõ Pinyin/Hán.</p>
                        </div>
                    </div>
                </div>
            `;
        };

        window.renderTeacherDashboard = () => {
            let lessonsHtml = lessons.map((l) => `
                <div class="card-hover bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4 gap-3 group">
                    <div class="pl-2 border-l-4 border-teal-500">
                        <h3 class="font-bold text-lg text-slate-800 dark:text-gray-100">${l.title}</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">${l.words ? l.words.length : 0} từ vựng | Nhấn 'Tạo Mã' để gửi cho Sinh Viên</p>
                    </div>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="window.exportLesson('${l.id}')" class="flex-1 sm:flex-none text-white font-bold bg-blue-500 hover:bg-blue-600 btn-effect px-4 py-2 rounded-xl text-sm shadow flex justify-center items-center gap-1">🔗 Tạo Mã Chia Sẻ</button>
                        <button onclick="window.deleteLesson('${l.id}')" class="text-red-500 bg-red-50 hover:bg-red-100 dark:bg-slate-700 dark:hover:bg-slate-600 px-3 py-2 rounded-xl transition">Xóa</button>
                    </div>
                </div>
            `).join('');

            contentDiv.innerHTML = `
                <div class="w-full max-w-3xl animate-slide-up">
                    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8 bg-white/60 dark:bg-slate-800/60 backdrop-blur-md p-6 rounded-[2rem] shadow-sm border border-white/50 dark:border-slate-700">
                        <div>
                            <h2 class="text-2xl font-extrabold text-slate-800 dark:text-white">Quản Lý Bài Học</h2>
                            <p class="text-slate-500 dark:text-slate-400 mt-1">Dữ liệu được lưu ngay trên thiết bị này.</p>
                        </div>
                        <button onclick="window.renderCreateLesson()" class="btn-effect w-full sm:w-auto bg-teal-600 hover:bg-teal-700 text-white px-6 py-3 rounded-2xl shadow-lg transition-all font-bold flex items-center justify-center gap-2">
                            <span class="text-xl">+</span> Tạo bài mới
                        </button>
                    </div>
                    <div class="space-y-2">
                        ${lessonsHtml.length > 0 ? lessonsHtml : `<div class="bg-white/50 p-12 rounded-[2rem] text-center border-2 border-dashed border-slate-300 dark:border-slate-600 dark:bg-slate-800/50"><p class="text-slate-500 font-medium">Chưa có bài học nào. Hãy bấm "Tạo bài mới".</p></div>`}
                    </div>
                </div>
            `;
        };

        window.exportLesson = (id) => {
            const lesson = lessons.find(l => l.id === id);
            const encoded = btoa(encodeURIComponent(JSON.stringify(lesson)));
            document.getElementById('code-modal').classList.remove('hidden');
            document.getElementById('modal-title').textContent = 'Mã Chia Sẻ Bài Học';
            document.getElementById('modal-textarea').value = encoded;
            document.getElementById('modal-textarea').readOnly = true;
            
            const actionBtn = document.getElementById('modal-action-btn');
            actionBtn.textContent = 'Copy Mã Này';
            actionBtn.onclick = () => {
                navigator.clipboard.writeText(encoded);
                window.showNotification('Đã copy mã! Hãy dán gửi cho sinh viên.', 'success');
                document.getElementById('code-modal').classList.add('hidden');
            };
        };

        window.deleteLesson = (id) => {
            if(confirm('Bạn có chắc muốn xóa bài này?')) {
                lessons = lessons.filter(l => l.id !== id);
                localStorage.setItem('tt_lessons', JSON.stringify(lessons));
                window.renderTeacherDashboard();
            }
        };

        window.renderCreateLesson = () => {
            contentDiv.innerHTML = `
                <div class="w-full max-w-4xl bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-[2rem] shadow-2xl animate-slide-up border border-slate-100 dark:border-slate-700 relative">
                    <button onclick="window.renderTeacherDashboard()" class="absolute -top-4 -right-4 bg-white dark:bg-slate-700 text-slate-500 dark:text-white p-3 rounded-full shadow-lg hover:text-red-500 btn-effect border border-slate-100 dark:border-slate-600">X</button>
                    <div class="mb-6"><h2 class="text-2xl font-extrabold text-slate-800 dark:text-white flex items-center gap-3"><span class="bg-teal-100 dark:bg-teal-900/50 text-teal-600 dark:text-teal-400 p-2 rounded-xl">📝</span> Tạo Bài Học</h2></div>
                    <div class="mb-4">
                        <input type="text" id="lesson-title" placeholder="Tên bài học (VD: HSK 1)" class="w-full p-4 bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-2xl focus:border-teal-500 focus:ring-4 outline-none font-medium dark:text-white text-lg">
                    </div>
                    <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6 bg-indigo-50/50 dark:bg-indigo-900/10 p-5 rounded-2xl border border-indigo-100 dark:border-indigo-800/30">
                        <div class="text-left w-full sm:w-auto">
                            <h4 class="font-bold text-indigo-900 dark:text-indigo-300">Nhập từ file Excel tự động nhận diện cột</h4>
                            <p class="text-xs text-indigo-600 dark:text-indigo-400 mt-1">Sẽ tự động TỪ CHỐI cột ví dụ. Chỉ lấy đúng: TỪ MỚI, PHIÊN ÂM, NGHĨA</p>
                        </div>
                        <input type="file" id="excel-file" accept=".xlsx, .xls, .csv" class="hidden" onchange="window.handleExcelUpload(event)">
                        <button onclick="document.getElementById('excel-file').click()" class="btn-effect w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition">Tải file lên</button>
                    </div>
                    <div id="word-list" class="space-y-4 mb-6 max-h-[45vh] overflow-y-auto pr-2 scrollbar-thin"></div>
                    <button onclick="window.addWordRow()" class="btn-effect w-full border-2 border-dashed border-slate-300 text-slate-500 font-bold py-4 rounded-2xl hover:bg-slate-50 transition mb-6">+ Thêm một từ trống</button>
                    <button onclick="window.saveLesson()" class="btn-effect w-full bg-teal-600 hover:bg-teal-700 text-white font-extrabold py-4 rounded-2xl shadow-xl text-lg">LƯU BÀI HỌC</button>
                </div>
            `;
            window.addWordRow();
        };

        window.handleExcelUpload = (event) => {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                    if (json.length > 0) {
                        let headerRowIndex = -1;
                        let zhCol = -1, pyCol = -1, viCol = -1;
                        
                        // Quét 10 dòng đầu để tìm ĐÚNG tên cột
                        for (let i = 0; i < Math.min(10, json.length); i++) {
                            const row = json[i];
                            if (!row) continue;
                            for (let j = 0; j < row.length; j++) {
                                // Xóa mọi khoảng trắng thừa để đối chiếu chính xác
                                const cellValue = String(row[j] || '').toLowerCase().replace(/\\s+/g, ' ').trim();
                                
                                // CHỈ lấy khi === (chính xác tuyệt đối), không dùng includes để tránh cột ví dụ
                                if (zhCol === -1 && (cellValue === 'từ mới' || cellValue === 'từ' || cellValue === 'hán')) zhCol = j;
                                if (pyCol === -1 && (cellValue === 'phiên âm' || cellValue === 'pinyin')) pyCol = j;
                                if (viCol === -1 && (cellValue === 'nghĩa' || cellValue === 'tiếng việt' || cellValue === 'nghĩa tiếng việt')) viCol = j;
                            }
                            // Nếu tìm thấy ít nhất 1 cột thì xác định đó là dòng tiêu đề và dừng quét dòng
                            if (zhCol !== -1 || pyCol !== -1 || viCol !== -1) {
                                headerRowIndex = i;
                                break;
                            }
                        }

                        if (headerRowIndex === -1) {
                            zhCol = 1; pyCol = 2; viCol = 3; headerRowIndex = 0;
                        } else {
                            if (zhCol === -1) zhCol = 1;
                            if (pyCol === -1) pyCol = 2;
                            if (viCol === -1) viCol = 3;
                        }

                        document.getElementById('word-list').innerHTML = '';
                        let count = 0;
                        for (let i = headerRowIndex + 1; i < json.length; i++) {
                            const r = json[i]; if (!r || r.length === 0) continue;
                            const zh = r[zhCol] ? String(r[zhCol]).trim() : ''; 
                            const py = r[pyCol] ? String(r[pyCol]).trim() : ''; 
                            const vi = r[viCol] ? String(r[viCol]).trim() : '';
                            if (zh || py || vi) { window.addWordRowWithValue(zh, py, vi); count++; }
                        }
                        const t = document.getElementById('lesson-title'); if (!t.value) t.value = file.name.replace(/\\.[^/.]+$/, "");
                        window.showNotification(`Đã phân tích ${count} từ vựng chuẩn xác!`, "success");
                    }
                } catch (err) { window.showNotification('File lỗi định dạng.', "error"); }
                event.target.value = '';
            };
            reader.readAsArrayBuffer(file);
        };

        window.addWordRow = () => window.addWordRowWithValue('', '', '');
        window.addWordRowWithValue = (zh, py, vi) => {
            const c = document.getElementById('word-list');
            const r = document.createElement('div');
            r.className = 'flex flex-col sm:grid sm:grid-cols-3 gap-3 p-4 bg-slate-50 dark:bg-slate-700/30 rounded-2xl word-row border border-slate-200 dark:border-slate-600 relative group';
            r.innerHTML = `
                <div class="relative"><span class="absolute -top-2.5 left-3 bg-slate-50 dark:bg-slate-800 px-1 text-[10px] font-bold text-slate-400">Chữ Hán</span><input type="text" class="zh-input p-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-600 rounded-xl outline-none w-full dark:text-white" lang="zh-CN"></div>
                <div class="relative"><span class="absolute -top-2.5 left-3 bg-slate-50 dark:bg-slate-800 px-1 text-[10px] font-bold text-slate-400">Pinyin</span><input type="text" class="py-input p-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-600 rounded-xl outline-none w-full dark:text-white text-blue-600 dark:text-blue-400"></div>
                <div class="relative"><span class="absolute -top-2.5 left-3 bg-slate-50 dark:bg-slate-800 px-1 text-[10px] font-bold text-slate-400">Nghĩa</span><input type="text" class="vi-input p-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-600 rounded-xl outline-none w-full dark:text-white text-green-600 dark:text-green-400" lang="vi"></div>
                <button onclick="this.parentElement.remove()" class="absolute -right-2 -top-2 bg-red-100 text-red-500 p-1.5 rounded-full shadow-sm">X</button>
            `;
            r.querySelector('.zh-input').value = zh; r.querySelector('.py-input').value = py; r.querySelector('.vi-input').value = vi;
            c.appendChild(r); c.scrollTop = c.scrollHeight;
        };

        window.saveLesson = () => {
            const title = document.getElementById('lesson-title').value.trim();
            if (!title) return window.showNotification('Quên nhập tên bài học kìa!', 'warning');
            const rows = document.querySelectorAll('.word-row');
            let words = []; let isValid = true;
            rows.forEach(r => {
                const zh = r.querySelector('.zh-input').value.trim(); const py = r.querySelector('.py-input').value.trim(); const vi = r.querySelector('.vi-input').value.trim();
                if (zh || py || vi) {
                    if (!zh || !py || !vi) { isValid = false; r.classList.add('border-red-400', 'shake'); }
                    else { r.classList.remove('border-red-400', 'shake'); words.push({ zh, py, vi }); }
                }
            });
            if (!isValid) return window.showNotification('Hãy điền đủ 3 ô cho mỗi từ nhé!', 'error');
            if (words.length === 0) return window.showNotification('Chưa có từ vựng nào!', 'warning');

            lessons.push({ id: 'ls_' + Date.now(), title, words, createdAt: Date.now() });
            localStorage.setItem('tt_lessons', JSON.stringify(lessons));
            window.showNotification('Đã lưu bài học thành công trên máy này!', 'success');
            window.renderTeacherDashboard();
        };

        window.renderStudentDashboard = () => {
            let lessonsHtml = lessons.map(l => `
                <div class="card-hover bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 cursor-pointer text-center group"
                     onclick="window.showPracticeOptions('${l.id}')">
                    <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/40 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:-translate-y-2 transition-all">📚</div>
                    <h3 class="font-bold text-slate-800 dark:text-gray-100 text-lg mb-2">${l.title}</h3>
                    <div class="inline-flex items-center px-3 py-1 bg-slate-100 dark:bg-slate-700 rounded-full text-xs font-semibold text-slate-500 mb-4">${l.words ? l.words.length : 0} từ vựng</div>
                    <button class="w-full bg-slate-50 dark:bg-slate-700 text-blue-600 font-bold py-3 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-colors">VÀO HỌC</button>
                    <button onclick="event.stopPropagation(); window.deleteLesson('${l.id}')" class="text-xs text-red-400 mt-3 hover:text-red-600">Xóa khỏi máy</button>
                </div>
            `).join('');

            contentDiv.innerHTML = `
                <div class="w-full max-w-5xl animate-slide-up">
                    <div class="text-center mb-8">
                        <h2 class="text-3xl font-extrabold text-slate-800 dark:text-white">Khu Vực Luyện Tập</h2>
                        <button onclick="window.showImportModal()" class="mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg btn-effect">
                            📥 Nhập Mã Bài Học Từ Giảng Viên
                        </button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                        ${lessonsHtml.length > 0 ? lessonsHtml : `<div class="col-span-full bg-white/50 p-12 rounded-[2rem] text-center border-2 border-dashed border-slate-300 dark:bg-slate-800/50"><p class="text-slate-500 text-lg">Bạn chưa có bài học nào. Hãy bấm "Nhập Mã Bài Học" ở trên.</p></div>`}
                    </div>
                </div>
            `;
        };

        window.showImportModal = () => {
            document.getElementById('code-modal').classList.remove('hidden');
            document.getElementById('modal-title').textContent = 'Nhập Mã Bài Học';
            document.getElementById('modal-textarea').value = '';
            document.getElementById('modal-textarea').readOnly = false;
            
            const actionBtn = document.getElementById('modal-action-btn');
            actionBtn.textContent = 'Thêm Bài Học';
            actionBtn.onclick = () => {
                const code = document.getElementById('modal-textarea').value.trim();
                if(!code) return window.showNotification("Hãy dán mã vào!", "warning");
                try {
                    const parsedLesson = JSON.parse(decodeURIComponent(atob(code)));
                    if(parsedLesson && parsedLesson.title && parsedLesson.words) {
                        parsedLesson.id = 'ls_imported_' + Date.now();
                        lessons.push(parsedLesson);
                        localStorage.setItem('tt_lessons', JSON.stringify(lessons));
                        window.showNotification("Đã thêm bài học thành công!", "success");
                        document.getElementById('code-modal').classList.add('hidden');
                        window.renderStudentDashboard();
                    } else { throw new Error("Mã không hợp lệ"); }
                } catch (e) { window.showNotification("Mã bài học không đúng định dạng!", "error"); }
            };
        };

        window.showPracticeOptions = (lessonId) => {
            const lesson = lessons.find(l => l.id === lessonId);
            contentDiv.innerHTML = `
                <div class="w-full max-w-lg bg-white/95 dark:bg-slate-800/95 backdrop-blur-xl p-8 sm:p-10 rounded-[2.5rem] shadow-2xl animate-slide-up text-center">
                    <button onclick="window.renderStudentDashboard()" class="absolute top-6 left-6 text-slate-400 bg-slate-100 dark:bg-slate-700 p-2.5 rounded-full btn-effect">Trở lại</button>
                    <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 mt-4"><span class="text-4xl">🎯</span></div>
                    <h2 class="text-2xl font-black text-slate-800 dark:text-white mb-2">${lesson.title}</h2>
                    <p class="text-slate-500 mb-8 font-medium">Bạn muốn đề bài hiển thị thông tin gì?</p>
                    <div class="space-y-4">
                        <button onclick="window.startPractice('${lessonId}', 'show-zh')" class="btn-effect w-full bg-red-50 text-red-700 border-2 border-red-200 font-bold py-5 rounded-2xl text-lg dark:bg-red-900/20 dark:text-red-400 dark:border-red-800/50">Nhìn Chữ Hán</button>
                        <button onclick="window.startPractice('${lessonId}', 'show-py')" class="btn-effect w-full bg-blue-50 text-blue-700 border-2 border-blue-200 font-bold py-5 rounded-2xl text-lg dark:bg-blue-900/20 dark:text-blue-400 dark:border-blue-800/50">Nhìn Pinyin</button>
                        <button onclick="window.startPractice('${lessonId}', 'show-vi')" class="btn-effect w-full bg-green-50 text-green-700 border-2 border-green-200 font-bold py-5 rounded-2xl text-lg dark:bg-green-900/20 dark:text-green-400 dark:border-green-800/50">Nhìn Nghĩa Việt</button>
                    </div>
                </div>
            `;
        };

        window.startPractice = (lessonId, mode) => {
            const lesson = lessons.find(l => l.id === lessonId);
            practiceState = { lesson, mode, words: [...lesson.words].sort(() => Math.random() - 0.5), currentWordIndex: 0, field1Passed: false, field2Passed: false };
            window.renderPracticeUI();
        };

        window.renderPracticeUI = () => {
            const wordList = practiceState.words;
            const word = wordList[practiceState.currentWordIndex];
            
            if (!word) {
                contentDiv.innerHTML = `
                    <div class="bg-white/95 dark:bg-slate-800/95 p-10 rounded-[2.5rem] shadow-2xl text-center animate-slide-up max-w-md w-full">
                        <div class="text-8xl mb-6 animate-[bounce_2s_infinite]">🏆</div>
                        <h2 class="text-3xl font-black text-teal-500 mb-3">Xuất sắc!</h2>
                        <p class="text-slate-600 dark:text-slate-300 mb-10 font-medium">Hoàn thành 100%.</p>
                        <button onclick="window.renderStudentDashboard()" class="btn-effect w-full bg-slate-800 text-white font-bold py-4 rounded-2xl text-lg dark:bg-white dark:text-slate-900">Hoàn tất</button>
                    </div>
                `;
                return;
            }

            let clueHtml = ''; let inputsHtml = '';
            const inputClass = "w-full p-5 bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-2xl outline-none text-center dark:text-white font-bold text-xl tracking-wide transition-colors";

            if (practiceState.mode === 'show-zh') {
                clueHtml = `<div class="text-7xl font-black text-slate-800 dark:text-white mb-4">${word.zh}</div>`;
                inputsHtml = `
                    <div class="space-y-6">
                        <div class="relative"><span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-blue-100 text-blue-600 px-3 py-1 text-xs font-bold rounded-full">Gõ Pinyin</span><input type="text" id="input-py" class="${inputClass} focus:border-blue-500" placeholder="..." autocomplete="off"></div>
                        <div class="relative"><span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-green-100 text-green-600 px-3 py-1 text-xs font-bold rounded-full">Gõ Nghĩa</span><input type="text" id="input-vi" lang="vi" class="${inputClass} focus:border-green-500" placeholder="..." autocomplete="off"></div>
                    </div>`;
            } else if (practiceState.mode === 'show-py') {
                clueHtml = `<div class="text-5xl font-black text-blue-600 mb-4">${word.py}</div>`;
                inputsHtml = `
                    <div class="space-y-6">
                        <div class="relative"><span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-red-100 text-red-600 px-3 py-1 text-xs font-bold rounded-full">Gõ Chữ Hán</span><input type="text" id="input-zh" lang="zh-CN" class="${inputClass} text-2xl focus:border-red-500" placeholder="..." autocomplete="off"></div>
                        <div class="relative"><span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-green-100 text-green-600 px-3 py-1 text-xs font-bold rounded-full">Gõ Nghĩa</span><input type="text" id="input-vi" lang="vi" class="${inputClass} focus:border-green-500" placeholder="..." autocomplete="off"></div>
                    </div>`;
            } else if (practiceState.mode === 'show-vi') {
                clueHtml = `<div class="text-4xl font-black text-green-600 mb-4 px-4">${word.vi}</div>`;
                inputsHtml = `
                    <div class="space-y-6">
                        <div class="relative"><span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-red-100 text-red-600 px-3 py-1 text-xs font-bold rounded-full">Gõ Chữ Hán</span><input type="text" id="input-zh" lang="zh-CN" class="${inputClass} text-2xl focus:border-red-500" placeholder="..." autocomplete="off"></div>
                        <div class="relative"><span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-blue-100 text-blue-600 px-3 py-1 text-xs font-bold rounded-full">Gõ Pinyin</span><input type="text" id="input-py" class="${inputClass} focus:border-blue-500" placeholder="..." autocomplete="off"></div>
                    </div>`;
            }

            const progress = ((practiceState.currentWordIndex) / wordList.length) * 100;

            contentDiv.innerHTML = `
                <div class="w-full max-w-lg bg-white/95 dark:bg-slate-800/95 backdrop-blur-xl p-6 sm:p-10 rounded-[2.5rem] shadow-2xl animate-slide-up text-center relative pt-14">
                    <button onclick="window.renderStudentDashboard()" class="absolute top-6 left-6 text-slate-400 bg-slate-100 dark:bg-slate-700 p-2.5 rounded-full btn-effect">X</button>
                    <div class="absolute top-6 right-6 font-bold text-slate-400 bg-slate-100 dark:bg-slate-700 px-4 py-1.5 rounded-full"><span class="text-teal-500">${practiceState.currentWordIndex + 1}</span> / ${wordList.length}</div>
                    
                    <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-2 mb-10 overflow-hidden"><div class="bg-teal-500 h-2 rounded-full transition-all duration-500" style="width: ${progress}%"></div></div>

                    <div class="mb-10 min-h-[100px] flex items-center justify-center">${clueHtml}</div>
                    <div class="bg-slate-50 dark:bg-slate-800/50 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-inner mt-4">${inputsHtml}</div>
                    
                    <button id="check-btn" onclick="window.checkAnswers()" class="btn-effect w-full mt-8 bg-slate-800 dark:bg-slate-100 text-white dark:text-slate-900 font-extrabold py-5 rounded-2xl shadow-xl text-xl">
                        Kiểm Tra
                    </button>
                </div>
            `;

            practiceState.field1Passed = false; practiceState.field2Passed = false;
            const inputs = document.querySelectorAll('input[type="text"]');
            inputs.forEach(input => { input.addEventListener('keypress', (e) => { if (e.key === 'Enter') window.checkAnswers(); }); });
        };

        window.checkAnswers = () => {
            const word = practiceState.words[practiceState.currentWordIndex];
            let i1, i2, correct1, correct2;

            if (practiceState.mode === 'show-zh') { i1 = document.getElementById('input-py'); correct1 = word.py; i2 = document.getElementById('input-vi'); correct2 = word.vi; }
            else if (practiceState.mode === 'show-py') { i1 = document.getElementById('input-zh'); correct1 = word.zh; i2 = document.getElementById('input-vi'); correct2 = word.vi; }
            else { i1 = document.getElementById('input-zh'); correct1 = word.zh; i2 = document.getElementById('input-py'); correct2 = word.py; }

            const validateField = (inputEl, correctValue) => {
                const val = inputEl.value.replace(/\\s+/g, '').toLowerCase();
                const target = correctValue.replace(/\\s+/g, '').toLowerCase();
                inputEl.classList.remove('border-slate-200', 'border-red-500', 'bg-red-50', 'border-green-500', 'bg-green-50', 'shake', 'text-red-600', 'dark:border-slate-700');
                void inputEl.offsetWidth;

                if (val === target) {
                    inputEl.classList.add('border-green-500', 'bg-green-50', 'text-green-600');
                    inputEl.readOnly = true; return true;
                } else {
                    inputEl.classList.add('border-red-500', 'bg-red-50', 'text-red-500', 'shake');
                    setTimeout(() => {
                        inputEl.value = ''; inputEl.classList.remove('border-red-500', 'bg-red-50', 'text-red-500');
                        inputEl.classList.add('border-slate-200', 'dark:border-slate-700');
                        if (!practiceState.field1Passed && !practiceState.field2Passed) inputEl.focus();
                    }, 800);
                    return false;
                }
            };

            if (!practiceState.field1Passed) practiceState.field1Passed = validateField(i1, correct1);
            if (!practiceState.field2Passed) practiceState.field2Passed = validateField(i2, correct2);

            if (practiceState.field1Passed && practiceState.field2Passed) {
                const btn = document.getElementById('check-btn');
                btn.innerHTML = 'Chính xác!';
                btn.className = "btn-effect w-full mt-8 bg-green-500 text-white font-extrabold py-5 rounded-2xl shadow-xl shadow-green-500/30 text-xl";
                setTimeout(() => { practiceState.currentWordIndex++; window.renderPracticeUI(); }, 800);
            }
        };

        render();
    </script>
</body>
</html>
