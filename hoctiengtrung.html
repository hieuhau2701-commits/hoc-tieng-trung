<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Học Tiếng Trung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">
    
    <div id="app" class="flex flex-col min-h-screen"></div>

    <script>
        // --- DỮ LIỆU LƯU TRỮ TẠM THỜI ---
        let currentUser = null; 
        let lessons = []; 
        let currentExercise = null; 

        const appDiv = document.getElementById('app');

        // --- ĐIỀU HƯỚNG MÀN HÌNH ---
        function renderApp() {
            if (!currentUser) {
                renderLogin();
            } else if (currentUser.role === 'teacher') {
                renderTeacherDashboard();
            } else {
                renderStudentDashboard();
            }
        }

        // --- ĐĂNG NHẬP ---
        function renderLogin() {
            appDiv.innerHTML = `
                <div class="flex-grow flex items-center justify-center p-4">
                    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md fade-in">
                        <h1 class="text-3xl font-bold text-center text-teal-600 mb-8">Học Tiếng Trung</h1>
                        <div class="space-y-4">
                            <button onclick="login('teacher')" class="w-full bg-teal-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-teal-700 transition shadow-md">Đăng nhập Giảng Viên</button>
                            <button onclick="login('student')" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-blue-700 transition shadow-md">Đăng nhập Sinh Viên</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function login(role) {
            currentUser = { role: role, username: role === 'teacher' ? 'Giảng viên' : 'Sinh viên' };
            renderApp();
        }

        function logout() {
            currentUser = null;
            renderApp();
        }

        function renderNavbar() {
            return `
                <nav class="bg-white shadow-sm p-4 sticky top-0 z-10">
                    <div class="max-w-4xl mx-auto flex justify-between items-center">
                        <h1 class="font-bold text-xl text-teal-600">Học Tiếng Trung</h1>
                        <div class="flex items-center gap-4">
                            <span class="text-sm text-gray-600 font-medium">Chào, ${currentUser.username}</span>
                            <button onclick="logout()" class="text-sm bg-red-50 text-red-500 px-3 py-1 rounded-lg hover:bg-red-100 font-medium transition">Đăng xuất</button>
                        </div>
                    </div>
                </nav>
            `;
        }

        // --- GIAO DIỆN GIẢNG VIÊN ---
        function renderTeacherDashboard() {
            let lessonsHtml = lessons.length === 0 
                ? '<div class="text-center py-12 text-gray-400"><p>Chưa có bài học nào.</p><p class="text-sm mt-1">Hãy bấm tạo bài mới nhé!</p></div>'
                : lessons.map((l) => `
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 flex justify-between items-center mb-3 hover:shadow-md transition">
                        <div>
                            <h3 class="font-bold text-gray-800 text-lg">${l.title}</h3>
                            <p class="text-sm text-teal-600 font-medium mt-1">${l.words.length} từ vựng</p>
                        </div>
                    </div>
                `).join('');

            appDiv.innerHTML = `
                ${renderNavbar()}
                <div class="flex-grow p-4 max-w-4xl mx-auto w-full fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-gray-800">Quản lý bài học</h2>
                        <button onclick="renderCreateLesson()" class="bg-teal-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-sm hover:bg-teal-700 transition">+ Tạo bài mới</button>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
                        ${lessonsHtml}
                    </div>
                </div>
            `;
        }

        function renderCreateLesson() {
            appDiv.innerHTML = `
                ${renderNavbar()}
                <div class="flex-grow p-4 max-w-4xl mx-auto w-full">
                    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100 fade-in">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold text-gray-800">Tạo Bài Học Mới</h2>
                            <button onclick="renderTeacherDashboard()" class="text-gray-500 hover:text-gray-800 bg-gray-100 px-4 py-2 rounded-lg font-medium">Hủy</button>
                        </div>
                        
                        <input type="text" id="lesson-title" placeholder="Nhập tên bài học (VD: HSK 5 - Bài 1)" class="w-full p-4 border border-gray-300 rounded-xl mb-6 focus:ring-2 focus:ring-teal-500 outline-none text-lg font-medium">
                        
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6 bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                            <div>
                                <h4 class="font-bold text-indigo-900 mb-1">Nhập nhanh từ Excel</h4>
                                <p class="text-xs text-indigo-600">Định dạng file: Cột B (Chữ Hán) | Cột C (Pinyin) | Cột D (Nghĩa)</p>
                            </div>
                            <input type="file" id="excel-file" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleExcelUpload(event)">
                            <button onclick="document.getElementById('excel-file').click()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-6 rounded-xl shadow-sm transition whitespace-nowrap">
                                Chọn File Excel
                            </button>
                        </div>
                        
                        <div id="word-list" class="space-y-4 mb-6"></div>
                        
                        <button onclick="addWordRow()" class="w-full border-2 border-dashed border-teal-300 text-teal-600 font-bold py-4 rounded-xl hover:bg-teal-50 transition mb-6">
                            + Thêm một từ trống
                        </button>
                        
                        <button onclick="saveLesson()" class="w-full bg-teal-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-teal-700 transition text-lg">
                            LƯU BÀI HỌC
                        </button>
                    </div>
                </div>
            `;
            addWordRow();
        }

        // Xử lý đọc file Excel
        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const json = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                    
                    if (json.length > 1) {
                        document.getElementById('word-list').innerHTML = '';
                        let addedCount = 0;
                        for (let i = 1; i < json.length; i++) {
                            const row = json[i];
                            if (!row || row.length === 0) continue;
                            
                            // Cột 2 (index 1), Cột 3 (index 2), Cột 4 (index 3)
                            const zh = row[1] ? String(row[1]).trim() : '';
                            const py = row[2] ? String(row[2]).trim() : '';
                            const vi = row[3] ? String(row[3]).trim() : '';
                            
                            if (zh || py || vi) {
                                addWordRowWithValue(zh, py, vi);
                                addedCount++;
                            }
                        }
                        
                        const titleInput = document.getElementById('lesson-title');
                        if (!titleInput.value) {
                            titleInput.value = file.name.replace(/\.[^/.]+$/, "");
                        }
                        
                        alert(`Đã nhập thành công ${addedCount} từ vựng!`);
                    } else {
                        alert('File Excel trống hoặc không đúng định dạng!');
                    }
                } catch (error) {
                    alert('Lỗi đọc file Excel! Vui lòng thử lại.');
                }
                event.target.value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        function addWordRow() {
            addWordRowWithValue('', '', '');
        }

        function addWordRowWithValue(zh, py, vi) {
            const container = document.getElementById('word-list');
            const row = document.createElement('div');
            row.className = 'grid grid-cols-1 md:grid-cols-3 gap-3 p-4 bg-gray-50 rounded-xl word-row border border-gray-200';
            row.innerHTML = `
                <input type="text" placeholder="Chữ Hán (VD: 好)" class="zh-input p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none w-full" lang="zh-CN">
                <input type="text" placeholder="Pinyin (VD: hǎo)" class="py-input p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none w-full">
                <input type="text" placeholder="Nghĩa (VD: Tốt)" class="vi-input p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none w-full" lang="vi">
            `;
            row.querySelector('.zh-input').value = zh;
            row.querySelector('.py-input').value = py;
            row.querySelector('.vi-input').value = vi;
            container.appendChild(row);
        }

        function saveLesson() {
            const title = document.getElementById('lesson-title').value.trim();
            if (!title) return alert('Vui lòng nhập tên bài học!');
            
            const rows = document.querySelectorAll('.word-row');
            const words = [];
            rows.forEach(row => {
                const zh = row.querySelector('.zh-input').value.trim();
                const py = row.querySelector('.py-input').value.trim();
                const vi = row.querySelector('.vi-input').value.trim();
                if (zh && py && vi) {
                    words.push({ zh, py, vi });
                }
            });

            if (words.length === 0) return alert('Bài học phải có ít nhất 1 từ vựng đầy đủ thông tin!');

            lessons.push({ id: Date.now(), title, words });
            renderTeacherDashboard();
        }

        // --- GIAO DIỆN SINH VIÊN ---
        function renderStudentDashboard() {
            let lessonsHtml = lessons.length === 0 
                ? '<div class="text-center py-12 text-gray-400"><p>Chưa có bài tập nào được giao.</p></div>'
                : lessons.map(l => `
                    <div class="bg-white p-5 rounded-xl border border-gray-200 flex justify-between items-center mb-4 hover:shadow-md hover:border-blue-300 transition cursor-pointer group" onclick="setupExercise(${l.id})">
                        <div>
                            <h3 class="font-bold text-gray-800 text-lg group-hover:text-blue-600 transition">${l.title}</h3>
                            <p class="text-sm text-gray-500 mt-1">${l.words.length} từ vựng</p>
                        </div>
                        <span class="bg-blue-50 text-blue-600 font-bold py-2 px-4 rounded-lg group-hover:bg-blue-600 group-hover:text-white transition">Học ngay &rarr;</span>
                    </div>
                `).join('');

            appDiv.innerHTML = `
                ${renderNavbar()}
                <div class="flex-grow p-4 max-w-4xl mx-auto w-full fade-in">
                    <h2 class="text-2xl font-bold mb-6 text-gray-800">Danh sách bài tập</h2>
                    <div>
                        ${lessonsHtml}
                    </div>
                </div>
            `;
        }

        function setupExercise(lessonId) {
            const lesson = lessons.find(l => l.id === lessonId);
            appDiv.innerHTML = `
                ${renderNavbar()}
                <div class="flex-grow p-4 max-w-2xl mx-auto w-full flex flex-col justify-center fade-in">
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center">
                        <h2 class="text-2xl font-bold mb-2 text-gray-800">Cài đặt luyện tập</h2>
                        <p class="text-gray-500 mb-8">Bạn muốn hệ thống hiển thị thông tin gì làm câu hỏi?</p>
                        
                        <div class="flex flex-col gap-4">
                            <button onclick="startExercise(${lessonId}, 'zh')" class="p-4 border-2 border-gray-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 font-bold transition text-lg text-gray-700">
                                Hiển thị Chữ Hán
                            </button>
                            <button onclick="startExercise(${lessonId}, 'py')" class="p-4 border-2 border-gray-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 font-bold transition text-lg text-gray-700">
                                Hiển thị Pinyin
                            </button>
                            <button onclick="startExercise(${lessonId}, 'vi')" class="p-4 border-2 border-gray-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 font-bold transition text-lg text-gray-700">
                                Hiển thị Tiếng Việt
                            </button>
                        </div>
                        
                        <button onclick="renderStudentDashboard()" class="mt-8 text-gray-400 hover:text-gray-600 font-medium">Quay lại danh sách</button>
                    </div>
                </div>
            `;
        }

        function startExercise(lessonId, hintType) {
            const lesson = lessons.find(l => l.id === lessonId);
            currentExercise = {
                lessonTitle: lesson.title,
                words: [...lesson.words].sort(() => Math.random() - 0.5), // Xáo trộn từ
                currentIndex: 0,
                hintType: hintType
            };
            renderExercise();
        }

        function renderExercise() {
            if (currentExercise.currentIndex >= currentExercise.words.length) {
                appDiv.innerHTML = `
                    ${renderNavbar()}
                    <div class="flex-grow flex items-center justify-center p-4">
                        <div class="bg-white p-8 rounded-3xl shadow-lg text-center max-w-sm w-full fade-in border border-green-100">
                            <div class="text-6xl mb-6">🏆</div>
                            <h2 class="text-2xl font-bold text-teal-600 mb-2">Tuyệt vời!</h2>
                            <p class="text-gray-600 mb-8">Bạn đã hoàn thành bài: <strong>${currentExercise.lessonTitle}</strong></p>
                            <button onclick="renderStudentDashboard()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 shadow-md transition text-lg">Hoàn tất</button>
                        </div>
                    </div>
                `;
                return;
            }

            const word = currentExercise.words[currentExercise.currentIndex];
            const hintType = currentExercise.hintType;
            
            let hintDisplay = '';
            let inputsHtml = '';

            if (hintType === 'zh') {
                hintDisplay = `<div class="text-6xl font-bold text-gray-800 mb-3">${word.zh}</div><div class="text-sm font-medium text-gray-400 tracking-widest uppercase">Chữ Hán</div>`;
                inputsHtml = `
                    <input type="text" id="ans-py" placeholder="Nhập Pinyin..." class="w-full p-4 border-2 border-gray-200 rounded-xl text-center text-xl font-medium focus:border-blue-500 focus:outline-none transition mb-4">
                    <input type="text" id="ans-vi" placeholder="Nhập Nghĩa tiếng Việt..." class="w-full p-4 border-2 border-gray-200 rounded-xl text-center text-xl font-medium focus:border-blue-500 focus:outline-none transition" lang="vi">
                `;
            } else if (hintType === 'py') {
                hintDisplay = `<div class="text-5xl font-bold text-blue-600 mb-3">${word.py}</div><div class="text-sm font-medium text-gray-400 tracking-widest uppercase">Pinyin</div>`;
                inputsHtml = `
                    <input type="text" id="ans-zh" placeholder="Nhập Chữ Hán..." class="w-full p-4 border-2 border-gray-200 rounded-xl text-center text-xl font-medium focus:border-blue-500 focus:outline-none transition mb-4" lang="zh-CN">
                    <input type="text" id="ans-vi" placeholder="Nhập Nghĩa tiếng Việt..." class="w-full p-4 border-2 border-gray-200 rounded-xl text-center text-xl font-medium focus:border-blue-500 focus:outline-none transition" lang="vi">
                `;
            } else if (hintType === 'vi') {
                hintDisplay = `<div class="text-4xl font-bold text-teal-600 mb-3">${word.vi}</div><div class="text-sm font-medium text-gray-400 tracking-widest uppercase">Nghĩa Tiếng Việt</div>`;
                inputsHtml = `
                    <input type="text" id="ans-zh" placeholder="Nhập Chữ Hán..." class="w-full p-4 border-2 border-gray-200 rounded-xl text-center text-xl font-medium focus:border-blue-500 focus:outline-none transition mb-4" lang="zh-CN">
                    <input type="text" id="ans-py" placeholder="Nhập Pinyin..." class="w-full p-4 border-2 border-gray-200 rounded-xl text-center text-xl font-medium focus:border-blue-500 focus:outline-none transition">
                `;
            }

            appDiv.innerHTML = `
                ${renderNavbar()}
                <div class="flex-grow p-4 max-w-xl mx-auto w-full flex flex-col pt-8 md:pt-16">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <div class="bg-gray-200 rounded-full h-2 w-full max-w-[200px] overflow-hidden">
                            <div class="bg-blue-500 h-full" style="width: ${(currentExercise.currentIndex / currentExercise.words.length) * 100}%"></div>
                        </div>
                        <span class="text-gray-500 font-bold ml-4">${currentExercise.currentIndex + 1} / ${currentExercise.words.length}</span>
                    </div>
                    
                    <div class="bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-gray-100 text-center mb-6 fade-in">
                        <div class="mb-10">
                            ${hintDisplay}
                        </div>
                        <div class="space-y-2">
                            ${inputsHtml}
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <button onclick="renderStudentDashboard()" class="px-6 py-4 rounded-2xl font-bold text-gray-500 bg-gray-200 hover:bg-gray-300 transition">Thoát</button>
                        <button onclick="checkAnswer()" class="flex-grow bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition text-xl">Kiểm tra</button>
                    </div>
                </div>
            `;
        }

        function checkAnswer() {
            const word = currentExercise.words[currentExercise.currentIndex];
            const hintType = currentExercise.hintType;
            let isCorrect = true;

            const checkField = (id, correctVal) => {
                const input = document.getElementById(id);
                if (!input) return;
                
                // Chuẩn hóa chuỗi (bỏ khoảng trắng 2 đầu, chuyển chữ thường)
                const userVal = input.value.trim().toLowerCase();
                const expectedVal = correctVal.trim().toLowerCase();
                
                if (userVal === expectedVal) {
                    input.classList.remove('border-gray-200', 'border-red-500', 'text-red-600');
                    input.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                } else {
                    input.classList.remove('border-gray-200', 'border-green-500', 'bg-green-50', 'text-green-700');
                    input.classList.add('border-red-500', 'text-red-600');
                    input.value = ''; // Xóa chữ sai theo yêu cầu
                    isCorrect = false;
                }
            };

            if (hintType === 'zh') {
                checkField('ans-py', word.py);
                checkField('ans-vi', word.vi);
            } else if (hintType === 'py') {
                checkField('ans-zh', word.zh);
                checkField('ans-vi', word.vi);
            } else if (hintType === 'vi') {
                checkField('ans-zh', word.zh);
                checkField('ans-py', word.py);
            }

            if (isCorrect) {
                setTimeout(() => {
                    currentExercise.currentIndex++;
                    renderExercise();
                }, 800);
            }
        }

        // --- KHỞI CHẠY ---
        renderApp();
    </script>
</body>
</html>
